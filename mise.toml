[tools]
kubectl = "latest"
pre-commit = "latest"
terraform = "1.15.3"

[tasks.dns-render]
description = "Render generated DNS manifests from the Flux DNS source tree."
run = "python3 scripts/render-dns.py"

[tasks.dns-check]
description = "Verify DNS rendered manifests and kustomize output are current."
run = [
  "python3 scripts/render-dns.py --check",
  "kubectl kustomize kubernetes/flux/infrastructure/dns/rendered >/dev/null",
]
