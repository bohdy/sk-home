name: Terraform

on:
  push:
    branches-ignore:
      - "main"

jobs:
  detect-changes:
    name: Detect changed Terraform stacks
    runs-on: self-hosted

    steps:
      # Check out the repository with full history so the workflow can compare
      # the current revision against the correct pull request or push base.
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

  tf-plan:
    name: Terraform plan
    runs-on: self-hosted
    needs: detect-changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Get Secrets
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            535c2d90-8239-4f6b-a70f-b41b00c9d06c > TF_VAR_cloudflare_api_token
            34461539-ca00-4f0b-b7e0-b41b00c9c243 > TF_VAR_cloudflare_account_id

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.9

      - name: Terraform init
        run: terraform -chdir=terraform/gw init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform plan
        run: terraform -chdir=terraform/gw plan -out=tfplan

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: terraform/gw/tfplan.txt
          retention-days: 7

  tf-apply:
    name: Terraform apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    needs: tf-plan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.9

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: terraform/gw/tfplan.txt
