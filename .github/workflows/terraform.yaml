name: OpenTofu

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"
  workflow_dispatch:
    inputs:
      apply_gateway:
        # Keep network mutation explicitly opt-in while still allowing an
        # ordinary manual dispatch to refresh plans for every stack.
        description: Apply the reviewed gateway plan from this run
        required: true
        default: false
        type: boolean
      apply_gateway_snmp:
        # Keep the provider-compatible SNMP subset independently applicable
        # while RouterOS 7.21/7.22 breaks unrelated gateway resource updates.
        description: Import or apply only gateway SNMP communities
        required: true
        default: false
        type: boolean
      apply_gateway_dhcp:
        # Keep network-wide DHCP changes explicitly opt-in and independently
        # reviewable from unrelated gateway interface and BGP resources.
        description: Apply the reviewed gateway DHCP plan
        required: true
        default: false
        type: boolean
      apply_cloudflare:
        # Public routing and Access changes require an explicit reviewed apply
        # from main and must not share a dispatch with gateway mutation.
        description: Apply the reviewed Cloudflare tunnel and Access plan
        required: true
        default: false
        type: boolean

# The workflow only reads repository contents; credentials come from the
# Bitwarden action and are not exposed through the GitHub token.
permissions:
  contents: read

concurrency:
  group: opentofu
  # Never interrupt an apply because another push or dispatch started.
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect changed OpenTofu stacks
    runs-on: self-hosted
    strategy:
      matrix:
        stacks: [network/gw/interfaces, network/gw/dhcp, k3s/talos-cluster, cloudflare/tunnel]

    steps:
      # Check out the repository with full history so the workflow can compare
      # the current revision against the correct pull request or push base.
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

  tofu-plan:
    name: OpenTofu plan
    runs-on: self-hosted
    needs: detect-changes
    strategy:
      max-parallel: 1
      matrix:
        stacks: [network/gw/interfaces, network/gw/dhcp, k3s/talos-cluster, cloudflare/tunnel]
    #if: needs.detect-changes.outputs.changed == 'true'

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Configure OpenTofu plan artifact
        run: |
          # Convert stack paths like network/gw/interfaces into artifact names
          # like network-gw-interfaces-tofuplan without duplicating matrix data.
          plan_artifact="${STACK_PATH//\//-}-tofuplan"
          echo "TOFU_PLAN_ARTIFACT=${plan_artifact}" >> "$GITHUB_ENV"
        env:
          STACK_PATH: ${{ matrix.stacks }}

      - name: Get Secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            2c67255f-36f4-4344-b94d-b459014e9249 > KUBERNETES_BGP_TCP_MD5_KEY
            f59a5c29-2dc7-4acf-b74b-b48e015b7439 > SNMP_V2_COMMUNITY
            1ae61563-170c-4a94-9fdf-b48e015b7484 > SNMP_V3_USERNAME
            12e0ba06-701b-400d-821d-b48e015b74cd > SNMP_V3_AUTH_PASSWORD
            90e81979-e50d-46e9-9177-b48e015b751a > SNMP_V3_PRIV_PASSWORD
            704a25a3-5cb3-41a5-a0a1-b41c00c83189 > PROXMOX_VE_ENDPOINT
            bec590dc-5777-441f-8f4b-b41c00c84280 > PROXMOX_VE_API_TOKEN
            f6a9155e-b392-45b8-8254-b41c00c87486 > PROXMOX_VE_SSH_USERNAME
            a64de379-c939-4d47-841e-b41c00c8641d > PROXMOX_SSH_PRIVATE_KEY
            34461539-ca00-4f0b-b7e0-b41b00c9c243 > CLOUDFLARE_ACCOUNT_ID
            535c2d90-8239-4f6b-a70f-b41b00c9d06c > CLOUDFLARE_API_TOKEN
            483e35d1-7bd1-46df-9946-b48f00b093d8 > GRAFANA_ACCESS_EMAIL

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ matrix.stacks }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_snmp_v2_community: ${{ env.SNMP_V2_COMMUNITY }}
          TF_VAR_snmp_v3_username: ${{ env.SNMP_V3_USERNAME }}
          TF_VAR_snmp_v3_auth_password: ${{ env.SNMP_V3_AUTH_PASSWORD }}
          TF_VAR_snmp_v3_priv_password: ${{ env.SNMP_V3_PRIV_PASSWORD }}

      - name: OpenTofu validate
        run: tofu -chdir=terraform/${{ matrix.stacks }} validate

      - name: OpenTofu plan
        run: tofu -chdir=terraform/${{ matrix.stacks }} plan -out=tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_proxmox_endpoint: ${{ env.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ env.PROXMOX_VE_API_TOKEN }}
          TF_VAR_proxmox_ssh_private_key: ${{ env.PROXMOX_SSH_PRIVATE_KEY }}
          TF_VAR_proxmox_ssh_username: ${{ env.PROXMOX_VE_SSH_USERNAME }}
          TF_VAR_cloudflare_account_id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
          TF_VAR_grafana_access_email: ${{ env.GRAFANA_ACCESS_EMAIL }}
          TF_VAR_snmp_v2_community: ${{ env.SNMP_V2_COMMUNITY }}
          TF_VAR_snmp_v3_username: ${{ env.SNMP_V3_USERNAME }}
          TF_VAR_snmp_v3_auth_password: ${{ env.SNMP_V3_AUTH_PASSWORD }}
          TF_VAR_snmp_v3_priv_password: ${{ env.SNMP_V3_PRIV_PASSWORD }}

      - name: Upload OpenTofu plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ matrix.stacks }}/tofuplan
          if-no-files-found: error
          retention-days: 7

  tofu-apply:
    name: OpenTofu apply
    # Talos remains automatically applied only after a main-branch push. A
    # gateway dispatch must not implicitly mutate this separate stack.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    needs: tofu-plan
    strategy:
      max-parallel: 1
      matrix:
        # Apply only the stack whose main-branch changes are safe to automate;
        # gateway and Cloudflare control-plane stacks stay plan-only because
        # network and external-access changes have higher operational impact.
        stacks: [k3s/talos-cluster]

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Configure OpenTofu plan artifact
        run: |
          # Keep artifact naming derived from the stack path so adding stacks
          # only requires extending the matrix list.
          plan_artifact="${STACK_PATH//\//-}-tofuplan"
          echo "TOFU_PLAN_ARTIFACT=${plan_artifact}" >> "$GITHUB_ENV"
        env:
          STACK_PATH: ${{ matrix.stacks }}

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: Download OpenTofu plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ matrix.stacks }}

      - name: Get Secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            2c67255f-36f4-4344-b94d-b459014e9249 > KUBERNETES_BGP_TCP_MD5_KEY
            704a25a3-5cb3-41a5-a0a1-b41c00c83189 > PROXMOX_VE_ENDPOINT
            bec590dc-5777-441f-8f4b-b41c00c84280 > PROXMOX_VE_API_TOKEN
            f6a9155e-b392-45b8-8254-b41c00c87486 > PROXMOX_VE_SSH_USERNAME
            a64de379-c939-4d47-841e-b41c00c8641d > PROXMOX_SSH_PRIVATE_KEY
            2ea66873-6852-4af9-bca2-b48f00f84a0a > PROXMOX_EXPORTER_API_TOKEN

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ matrix.stacks }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: OpenTofu apply
        run: tofu -chdir=terraform/${{ matrix.stacks }} apply -auto-approve tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_proxmox_endpoint: ${{ env.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ env.PROXMOX_VE_API_TOKEN }}
          TF_VAR_proxmox_ssh_private_key: ${{ env.PROXMOX_SSH_PRIVATE_KEY }}
          TF_VAR_proxmox_ssh_username: ${{ env.PROXMOX_VE_SSH_USERNAME }}

      - name: Verify Proxmox exporter token handoff
        # The GitHub Bitwarden identity is intentionally read-only. Compare its
        # injected value with encrypted state and fail closed on any mismatch.
        run: |
          set +x
          exporter_token="$(tofu -chdir=terraform/${{ matrix.stacks }} output -raw proxmox_exporter_api_token)"

          case "${exporter_token}" in
            observability@pve!exporter=*) ;;
            *)
              echo "Proxmox exporter token output has an unexpected identity." >&2
              exit 1
              ;;
          esac

          echo "::add-mask::${exporter_token}"
          if [[ "${exporter_token}" != "${PROXMOX_EXPORTER_API_TOKEN}" ]]; then
            echo "Bitwarden does not match the OpenTofu-managed Proxmox exporter token." >&2
            exit 1
          fi
          unset exporter_token
        env:
          PROXMOX_EXPORTER_API_TOKEN: ${{ env.PROXMOX_EXPORTER_API_TOKEN }}

  gateway-apply:
    name: Apply reviewed gateway plan
    # Gateway mutation is available only as an explicit manual action against
    # main; pull requests and ordinary main pushes remain plan-only.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply_gateway && !inputs.apply_gateway_snmp && !inputs.apply_gateway_dhcp && !inputs.apply_cloudflare
    runs-on: self-hosted
    needs: tofu-plan
    environment: production

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache
      STACK_PATH: network/gw/interfaces
      TOFU_PLAN_ARTIFACT: network-gw-interfaces-tofuplan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      # Apply the immutable artifact produced by this run instead of creating
      # a second, potentially different plan after approval.
      - name: Download reviewed OpenTofu plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ env.STACK_PATH }}

      - name: Get gateway secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            2c67255f-36f4-4344-b94d-b459014e9249 > KUBERNETES_BGP_TCP_MD5_KEY
            f59a5c29-2dc7-4acf-b74b-b48e015b7439 > SNMP_V2_COMMUNITY
            1ae61563-170c-4a94-9fdf-b48e015b7484 > SNMP_V3_USERNAME
            12e0ba06-701b-400d-821d-b48e015b74cd > SNMP_V3_AUTH_PASSWORD
            90e81979-e50d-46e9-9177-b48e015b751a > SNMP_V3_PRIV_PASSWORD

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: OpenTofu apply
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} apply -auto-approve tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_snmp_v2_community: ${{ env.SNMP_V2_COMMUNITY }}
          TF_VAR_snmp_v3_username: ${{ env.SNMP_V3_USERNAME }}
          TF_VAR_snmp_v3_auth_password: ${{ env.SNMP_V3_AUTH_PASSWORD }}
          TF_VAR_snmp_v3_priv_password: ${{ env.SNMP_V3_PRIV_PASSWORD }}

  gateway-snmp-plan:
    name: Plan gateway SNMP adoption
    # A separate targeted artifact avoids planning the provider-broken IP and
    # BGP updates while retaining reviewable, immutable OpenTofu execution.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply_gateway_snmp && !inputs.apply_gateway && !inputs.apply_gateway_dhcp && !inputs.apply_cloudflare
    runs-on: self-hosted

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache
      STACK_PATH: network/gw/interfaces
      TOFU_PLAN_ARTIFACT: network-gw-snmp-tofuplan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: Get gateway SNMP secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            2c67255f-36f4-4344-b94d-b459014e9249 > KUBERNETES_BGP_TCP_MD5_KEY
            f59a5c29-2dc7-4acf-b74b-b48e015b7439 > SNMP_V2_COMMUNITY
            1ae61563-170c-4a94-9fdf-b48e015b7484 > SNMP_V3_USERNAME
            12e0ba06-701b-400d-821d-b48e015b74cd > SNMP_V3_AUTH_PASSWORD
            90e81979-e50d-46e9-9177-b48e015b751a > SNMP_V3_PRIV_PASSWORD

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Plan gateway SNMP resources
        run: >-
          tofu -chdir=terraform/${{ env.STACK_PATH }} plan
          -target=routeros_snmp_community.observability_v2
          -target=routeros_snmp_community.observability_v3
          -out=snmp-tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_snmp_v2_community: ${{ env.SNMP_V2_COMMUNITY }}
          TF_VAR_snmp_v3_username: ${{ env.SNMP_V3_USERNAME }}
          TF_VAR_snmp_v3_auth_password: ${{ env.SNMP_V3_AUTH_PASSWORD }}
          TF_VAR_snmp_v3_priv_password: ${{ env.SNMP_V3_PRIV_PASSWORD }}

      - name: Upload gateway SNMP plan
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ env.STACK_PATH }}/snmp-tofuplan
          if-no-files-found: error
          retention-days: 7

  gateway-snmp-apply:
    name: Apply gateway SNMP adoption
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply_gateway_snmp && !inputs.apply_gateway && !inputs.apply_gateway_dhcp && !inputs.apply_cloudflare
    runs-on: self-hosted
    needs: gateway-snmp-plan
    environment: production

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache
      STACK_PATH: network/gw/interfaces
      TOFU_PLAN_ARTIFACT: network-gw-snmp-tofuplan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: Download gateway SNMP plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ env.STACK_PATH }}

      - name: Get gateway SNMP secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            2c67255f-36f4-4344-b94d-b459014e9249 > KUBERNETES_BGP_TCP_MD5_KEY
            f59a5c29-2dc7-4acf-b74b-b48e015b7439 > SNMP_V2_COMMUNITY
            1ae61563-170c-4a94-9fdf-b48e015b7484 > SNMP_V3_USERNAME
            12e0ba06-701b-400d-821d-b48e015b74cd > SNMP_V3_AUTH_PASSWORD
            90e81979-e50d-46e9-9177-b48e015b751a > SNMP_V3_PRIV_PASSWORD

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Apply gateway SNMP plan
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} apply -auto-approve snmp-tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_snmp_v2_community: ${{ env.SNMP_V2_COMMUNITY }}
          TF_VAR_snmp_v3_username: ${{ env.SNMP_V3_USERNAME }}
          TF_VAR_snmp_v3_auth_password: ${{ env.SNMP_V3_AUTH_PASSWORD }}
          TF_VAR_snmp_v3_priv_password: ${{ env.SNMP_V3_PRIV_PASSWORD }}

  gateway-dhcp-plan:
    name: Plan gateway DHCP
    # Keep the dedicated DHCP plan isolated from the provider-blocked interface
    # and BGP stack while preserving immutable review before production apply.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply_gateway_dhcp && !inputs.apply_gateway && !inputs.apply_gateway_snmp && !inputs.apply_cloudflare
    runs-on: self-hosted

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache
      STACK_PATH: network/gw/dhcp
      TOFU_PLAN_ARTIFACT: network-gw-dhcp-tofuplan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: Get gateway DHCP secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Plan gateway DHCP
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} plan -out=dhcp-tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}

      - name: Upload gateway DHCP plan
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ env.STACK_PATH }}/dhcp-tofuplan
          if-no-files-found: error
          retention-days: 7

  gateway-dhcp-apply:
    name: Apply gateway DHCP
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply_gateway_dhcp && !inputs.apply_gateway && !inputs.apply_gateway_snmp && !inputs.apply_cloudflare
    runs-on: self-hosted
    needs: gateway-dhcp-plan
    environment: production

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache
      STACK_PATH: network/gw/dhcp
      TOFU_PLAN_ARTIFACT: network-gw-dhcp-tofuplan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: Download gateway DHCP plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ env.STACK_PATH }}

      - name: Get gateway DHCP secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Apply gateway DHCP plan
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} apply -auto-approve dhcp-tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}

  cloudflare-apply:
    name: Apply reviewed Cloudflare plan
    # External publication is opt-in and mutually exclusive with every gateway
    # mutation path so one approval always has one operational blast radius.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply_cloudflare && !inputs.apply_gateway && !inputs.apply_gateway_snmp && !inputs.apply_gateway_dhcp
    runs-on: self-hosted
    needs: tofu-plan
    environment: production

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache
      STACK_PATH: cloudflare/tunnel
      TOFU_PLAN_ARTIFACT: cloudflare-tunnel-tofuplan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      # Consume the immutable plan created before the production approval.
      - name: Download reviewed OpenTofu plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ env.STACK_PATH }}

      - name: Get Cloudflare secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            34461539-ca00-4f0b-b7e0-b41b00c9c243 > CLOUDFLARE_ACCOUNT_ID
            535c2d90-8239-4f6b-a70f-b41b00c9d06c > CLOUDFLARE_API_TOKEN
            483e35d1-7bd1-46df-9946-b48f00b093d8 > GRAFANA_ACCESS_EMAIL

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: OpenTofu apply
        run: tofu -chdir=terraform/${{ env.STACK_PATH }} apply -auto-approve tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_account_id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
          TF_VAR_grafana_access_email: ${{ env.GRAFANA_ACCESS_EMAIL }}
