name: Terraform

on:
  push:
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

concurrency:
  group: terraform
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect changed Terraform stacks
    runs-on: self-hosted
    strategy:
      matrix:
        stacks: [network/gw/interfaces, k3s/cluster]

    steps:
      # Check out the repository with full history so the workflow can compare
      # the current revision against the correct pull request or push base.
      - name: Checkout repository
        uses: actions/checkout@v6.0.2


  tf-plan:
    name: Terraform plan
    runs-on: self-hosted
    needs: detect-changes
    strategy:
      matrix:
        stacks: [network/gw/interfaces, k3s/cluster]
    #if: needs.detect-changes.outputs.changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Get Secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            704a25a3-5cb3-41a5-a0a1-b41c00c83189 > PROXMOX_VE_ENDPOINT
            bec590dc-5777-441f-8f4b-b41c00c84280 > PROXMOX_VE_API_TOKEN
            f6a9155e-b392-45b8-8254-b41c00c87486 > PROXMOX_VE_SSH_USERNAME
            a64de379-c939-4d47-841e-b41c00c8641d > PROXMOX_SSH_PRIVATE_KEY

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.9

      - name: Terraform init
        run: terraform -chdir=terraform/${{ matrix.stacks }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}

      - name: Terraform plan
        run: terraform -chdir=terraform/${{ matrix.stacks }} plan -out=tfplan
        env:
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_proxmox_endpoint: ${{ env.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ env.PROXMOX_VE_API_TOKEN }}
          TF_VAR_proxmox_ssh_private_key: ${{ env.PROXMOX_SSH_PRIVATE_KEY }}

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.stacks }}.tfplan
          path: terraform/${{ matrix.stacks }}/tfplan
          retention-days: 7

  tf-apply:
    name: Terraform apply
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    needs: tf-plan
    strategy:
      matrix:
        stacks: [network/gw/interfaces, k3s/cluster]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.9

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.stacks }}.tfplan
          path: terraform/${{ matrix.stacks }}.tfplan

      - name: Get Secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            704a25a3-5cb3-41a5-a0a1-b41c00c83189 > PROXMOX_VE_ENDPOINT
            bec590dc-5777-441f-8f4b-b41c00c84280 > PROXMOX_VE_API_TOKEN
            f6a9155e-b392-45b8-8254-b41c00c87486 > PROXMOX_VE_SSH_USERNAME
            a64de379-c939-4d47-841e-b41c00c8641d > PROXMOX_SSH_PRIVATE_KEY

      - name: Terraform apply
        run: terraform -chdir=terraform/${{ matrix.stacks }} apply -auto-approve terraform/${{ matrix.stacks }}.tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_proxmox_endpoint: ${{ env.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ env.PROXMOX_VE_API_TOKEN }}
          TF_VAR_proxmox_ssh_private_key: ${{ env.PROXMOX_SSH_PRIVATE_KEY }}
