name: OpenTofu

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"
  workflow_dispatch:

concurrency:
  group: opentofu
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect changed OpenTofu stacks
    runs-on: self-hosted
    strategy:
      matrix:
        stacks: [network/gw/interfaces, k3s/talos-cluster]

    steps:
      # Check out the repository with full history so the workflow can compare
      # the current revision against the correct pull request or push base.
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

  tofu-plan:
    name: OpenTofu plan
    runs-on: self-hosted
    needs: detect-changes
    strategy:
      max-parallel: 1
      matrix:
        stacks: [network/gw/interfaces, k3s/talos-cluster]
    #if: needs.detect-changes.outputs.changed == 'true'

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Configure OpenTofu plan artifact
        run: |
          # Convert stack paths like network/gw/interfaces into artifact names
          # like network-gw-interfaces-tofuplan without duplicating matrix data.
          plan_artifact="${STACK_PATH//\//-}-tofuplan"
          echo "TOFU_PLAN_ARTIFACT=${plan_artifact}" >> "$GITHUB_ENV"
        env:
          STACK_PATH: ${{ matrix.stacks }}

      - name: Get Secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            2c67255f-36f4-4344-b94d-b459014e9249 > KUBERNETES_BGP_TCP_MD5_KEY
            704a25a3-5cb3-41a5-a0a1-b41c00c83189 > PROXMOX_VE_ENDPOINT
            bec590dc-5777-441f-8f4b-b41c00c84280 > PROXMOX_VE_API_TOKEN
            f6a9155e-b392-45b8-8254-b41c00c87486 > PROXMOX_VE_SSH_USERNAME
            a64de379-c939-4d47-841e-b41c00c8641d > PROXMOX_SSH_PRIVATE_KEY

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ matrix.stacks }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}

      - name: OpenTofu validate
        run: tofu -chdir=terraform/${{ matrix.stacks }} validate

      - name: OpenTofu plan
        run: tofu -chdir=terraform/${{ matrix.stacks }} plan -out=tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_proxmox_endpoint: ${{ env.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ env.PROXMOX_VE_API_TOKEN }}
          TF_VAR_proxmox_ssh_private_key: ${{ env.PROXMOX_SSH_PRIVATE_KEY }}
          TF_VAR_proxmox_ssh_username: ${{ env.PROXMOX_VE_SSH_USERNAME }}

      - name: Upload OpenTofu plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ matrix.stacks }}/tofuplan
          if-no-files-found: error
          retention-days: 7

  tofu-apply:
    name: OpenTofu apply
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    needs: tofu-plan
    strategy:
      max-parallel: 1
      matrix:
        # Apply only the stack whose main-branch changes are safe to automate;
        # the gateway stack stays plan-only because router changes have higher
        # operational blast radius.
        stacks: [k3s/talos-cluster]

    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise-data
      MISE_CACHE_DIR: ${{ github.workspace }}/.mise-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Configure OpenTofu plan artifact
        run: |
          # Keep artifact naming derived from the stack path so adding stacks
          # only requires extending the matrix list.
          plan_artifact="${STACK_PATH//\//-}-tofuplan"
          echo "TOFU_PLAN_ARTIFACT=${plan_artifact}" >> "$GITHUB_ENV"
        env:
          STACK_PATH: ${{ matrix.stacks }}

      - name: Set up mise
        uses: jdx/mise-action@v4.0.1
        with:
          install: true

      - name: Download OpenTofu plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.TOFU_PLAN_ARTIFACT }}
          path: terraform/${{ matrix.stacks }}

      - name: Get Secrets
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f1a17686-db90-4ae0-80aa-b43701584bab > AWS_ACCESS_KEY_ID
            31f0524c-b94e-4446-ba46-b43701586360 > AWS_SECRET_ACCESS_KEY
            519790de-c23d-41f7-a838-b41b00c9444d > MIKROTIK_USERNAME
            6b950dde-8f31-4d7b-9fdc-b41b00c993ca > MIKROTIK_PASSWORD
            2c67255f-36f4-4344-b94d-b459014e9249 > KUBERNETES_BGP_TCP_MD5_KEY
            704a25a3-5cb3-41a5-a0a1-b41c00c83189 > PROXMOX_VE_ENDPOINT
            bec590dc-5777-441f-8f4b-b41c00c84280 > PROXMOX_VE_API_TOKEN
            f6a9155e-b392-45b8-8254-b41c00c87486 > PROXMOX_VE_SSH_USERNAME
            a64de379-c939-4d47-841e-b41c00c8641d > PROXMOX_SSH_PRIVATE_KEY

      - name: OpenTofu init
        run: tofu -chdir=terraform/${{ matrix.stacks }} init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: OpenTofu apply
        run: tofu -chdir=terraform/${{ matrix.stacks }} apply -auto-approve tofuplan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_mikrotik_username: ${{ env.MIKROTIK_USERNAME }}
          TF_VAR_mikrotik_password: ${{ env.MIKROTIK_PASSWORD }}
          TF_VAR_kubernetes_bgp_tcp_md5_key: ${{ env.KUBERNETES_BGP_TCP_MD5_KEY }}
          TF_VAR_proxmox_endpoint: ${{ env.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ env.PROXMOX_VE_API_TOKEN }}
          TF_VAR_proxmox_ssh_private_key: ${{ env.PROXMOX_SSH_PRIVATE_KEY }}
          TF_VAR_proxmox_ssh_username: ${{ env.PROXMOX_VE_SSH_USERNAME }}
