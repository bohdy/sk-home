name: Terraform

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"
  push:
    branches:
      - main
      - "chore/**"
      - "feat/**"
      - "fix/**"
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"

jobs:
  validate:
    name: Validate ${{ matrix.stack }}
    runs-on: self-hosted
    env:
      # Expose Cloudflare R2 credentials for backend-enabled Terraform jobs and
      # future remote-state operations in CI.
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: auto

      # Expose MikroTik credentials to Terraform through standard TF_VAR names
      # so provider configuration stays free of hardcoded secrets.
      TF_VAR_mikrotik_username: ${{ secrets.MIKROTIK_USERNAME }}
      TF_VAR_mikrotik_password: ${{ secrets.MIKROTIK_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: terraform/stacks/network-core
            stack_name: network-core
          - stack: terraform/stacks/wifi
            stack_name: wifi
          - stack: terraform/stacks/identity-edge
            stack_name: identity-edge
          - stack: terraform/stacks/overlay
            stack_name: overlay

    defaults:
      run:
        working-directory: ${{ matrix.stack }}

    steps:
      # Check out the repository so Terraform commands can run against the stack.
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Install a pinned Terraform version so local and CI behavior stay aligned.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.8

      # Keep formatting enforcement simple and consistent across all stacks.
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      # Install providers, initialize the R2 backend, and validate each stack
      # against the same remote-state backend used outside CI.
      - name: Terraform init
        run: terraform init -reconfigure

      # Validate the selected stack structure and provider configuration.
      - name: Terraform validate
        run: terraform validate
