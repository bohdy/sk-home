name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Choose whether the manual run should stop after validation or continue into apply for CI-ready stacks.
        required: false
        default: validate
        type: choice
        options:
          - validate
          - apply
      stack:
        description: Choose which stack the manual run should target.
        required: false
        default: all
        type: choice
        options:
          - all
          - network-core
          - network-core-interfaces-gw
          - network-core-interfaces-switch-1pp
          - network-core-interfaces-switch-1np
          - network-core-dhcp
          - network-core-routing
          - cluster-core
          - cluster-core-k3s
          - dns-blocky
          - dns-blocky-k3s
          - apps-unifi
          - observability
          - platform-proxmox
          - wifi
          - identity-edge
          - overlay
          - platform-k3s
  pull_request:
    paths:
      - ".github/workflows/terraform.yml"
      - "scripts/load-bitwarden-secrets.sh"
      - "terraform/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - "scripts/load-bitwarden-secrets.sh"
      - "terraform/**"

# Cancel superseded pull request and non-main branch runs so stale validation
# jobs do not occupy the self-hosted runner. Keep main branch runs intact so
# deployment-oriented executions are not preempted mid-flight.
concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  detect-changes:
    name: Detect changed Terraform stacks
    runs-on: self-hosted
    outputs:
      validate_matrix: ${{ steps.detect.outputs.validate_matrix }}
      apply_matrix: ${{ steps.detect.outputs.apply_matrix }}
      has_validate_changes: ${{ steps.detect.outputs.has_validate_changes }}
      has_apply_changes: ${{ steps.detect.outputs.has_apply_changes }}
    steps:
      # Check out the repository with full history so the workflow can compare
      # the current revision against the correct pull request or push base.
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      # Resolve the exact stack set once so validation and apply jobs stay
      # aligned and skip unrelated Terraform roots cleanly.
      - name: Detect changed stacks
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          declare -a STACK_DEFINITIONS=(
            "network-core:terraform/stacks/network-core:true:true"
            "network-core-interfaces-gw:terraform/stacks/network-core/interfaces/gw:true:true"
            "network-core-interfaces-switch-1pp:terraform/stacks/network-core/interfaces/switch-1pp:true:true"
            "network-core-interfaces-switch-1np:terraform/stacks/network-core/interfaces/switch-1np:true:true"
            "network-core-dhcp:terraform/stacks/network-core/dhcp:true:true"
            "network-core-routing:terraform/stacks/network-core/routing:true:true"
            "cluster-core:terraform/stacks/cluster-core:true:false"
            "cluster-core-k3s:terraform/stacks/cluster-core-k3s:true:false"
            "dns-blocky:terraform/stacks/dns-blocky:true:false"
            "dns-blocky-k3s:terraform/stacks/dns-blocky-k3s:true:false"
            "apps-unifi:terraform/stacks/apps-unifi:true:false"
            "observability:terraform/stacks/observability:true:false"
            "platform-proxmox:terraform/stacks/platform-proxmox:true:false"
            "platform-k3s:terraform/stacks/platform-k3s:true:true"
            # Keep the reserved wifi root validate-only until real wireless
            # resources and provider requirements exist in that stack.
            "wifi:terraform/stacks/wifi:false:false"
            "identity-edge:terraform/stacks/identity-edge:true:false"
            "overlay:terraform/stacks/overlay:true:false"
          )

          workflow_changed="false"
          modules_changed="false"
          selected_stack="${{ github.event.inputs.stack || 'all' }}"
          selected_action="${{ github.event.inputs.action || 'validate' }}"
          ref_name="${GITHUB_REF_NAME:-}"

          resolve_stack_name_for_path() {
            local path="$1"
            local best_name=""
            local best_match_length=0

            for stack_definition in "${STACK_DEFINITIONS[@]}"; do
              IFS=":" read -r candidate_name candidate_path _ _ <<<"${stack_definition}"

              if [[ "${path}" == "${candidate_path}" || "${path}" == "${candidate_path}/"* ]]; then
                if (( ${#candidate_path} > best_match_length )); then
                  best_name="${candidate_name}"
                  best_match_length=${#candidate_path}
                fi
              fi
            done

            # Return success even when a changed path does not belong to any
            # Terraform stack so non-stack docs and helper changes do not abort
            # the detection job under `set -e`.
            if [[ -n "${best_name}" ]]; then
              printf '%s\n' "${best_name}"
            fi

            return 0
          }

          changed_files=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            changed_files=""
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
          else
            before_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            # Fall back to the current commit diff when GitHub cannot provide a
            # meaningful "before" SHA, such as the first push on a new branch.
            if [[ -z "${before_sha}" || "${before_sha}" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "${head_sha}")"
            else
              changed_files="$(git diff --name-only "${before_sha}" "${head_sha}")"
            fi
          fi

          if grep -qxF ".github/workflows/terraform.yml" <<<"${changed_files}"; then
            workflow_changed="true"
          fi

          if grep -q '^terraform/modules/' <<<"${changed_files}"; then
            modules_changed="true"
          fi

          validate_include=""
          apply_include=""
          validate_count=0
          apply_count=0
          declare -A changed_stack_names=()

          if [[ "${workflow_changed}" != "true" && "${modules_changed}" != "true" && "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            while IFS= read -r changed_file; do
              [[ -n "${changed_file}" ]] || continue

              stack_name="$(resolve_stack_name_for_path "${changed_file}")"
              if [[ -n "${stack_name}" ]]; then
                changed_stack_names["${stack_name}"]=1
              fi
            done <<<"${changed_files}"
          fi

          for stack_definition in "${STACK_DEFINITIONS[@]}"; do
            IFS=":" read -r stack_name stack_path enable_plan enable_apply <<<"${stack_definition}"

            stack_selected="false"

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              if [[ "${selected_stack}" == "all" || "${selected_stack}" == "${stack_name}" ]]; then
                stack_selected="true"
              fi
            elif [[ "${workflow_changed}" == "true" || "${modules_changed}" == "true" ]]; then
              stack_selected="true"
            elif [[ -n "${changed_stack_names[${stack_name}]+x}" ]]; then
              stack_selected="true"
            fi

            if [[ "${stack_selected}" != "true" ]]; then
              continue
            fi

            validate_entry="{\"stack\":\"${stack_path}\",\"stack_name\":\"${stack_name}\",\"enable_plan\":${enable_plan},\"enable_apply\":${enable_apply}}"
            if [[ -z "${validate_include}" ]]; then
              validate_include="${validate_entry}"
            else
              validate_include="${validate_include},${validate_entry}"
            fi
            validate_count=$((validate_count + 1))

            if [[ "${enable_apply}" == "true" ]] && { [[ "${GITHUB_EVENT_NAME}" == "push" && "${ref_name}" == "main" ]] || [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${selected_action}" == "apply" ]]; }; then
              if [[ -z "${apply_include}" ]]; then
                apply_include="${validate_entry}"
              else
                apply_include="${apply_include},${validate_entry}"
              fi
              apply_count=$((apply_count + 1))
            fi
          done

          if [[ "${validate_count}" -eq 0 ]]; then
            validate_matrix='{"include":[]}'
            has_validate_changes="false"
          else
            validate_matrix="{\"include\":[${validate_include}]}"
            has_validate_changes="true"
          fi

          if [[ "${apply_count}" -eq 0 ]]; then
            apply_matrix='{"include":[]}'
            has_apply_changes="false"
          else
            apply_matrix="{\"include\":[${apply_include}]}"
            has_apply_changes="true"
          fi

          {
            echo "validate_matrix=${validate_matrix}"
            echo "apply_matrix=${apply_matrix}"
            echo "has_validate_changes=${has_validate_changes}"
            echo "has_apply_changes=${has_apply_changes}"
          } >> "${GITHUB_OUTPUT}"

  validate:
    name: Validate ${{ matrix.stack }}
    runs-on: self-hosted
    needs: detect-changes
    if: needs.detect-changes.outputs.has_validate_changes == 'true'
    timeout-minutes: 60
    env:
      # Keep the stable backend region in workflow config because it is a
      # non-secret compatibility value rather than credential material.
      AWS_REGION: auto
    strategy:
      fail-fast: false
      # Keep validation responsive without allowing the matrix to consume the
      # entire self-hosted runner at once.
      max-parallel: 2
      matrix: ${{ fromJson(needs.detect-changes.outputs.validate_matrix) }}

    defaults:
      run:
        working-directory: ${{ matrix.stack }}

    steps:
      # Check out the repository before loading secrets so the shared helper can
      # be reused by local runs and all CI workflows without duplication.
      - name: Checkout repository
        timeout-minutes: 5
        uses: actions/checkout@v6.0.2

      # Fail fast on self-hosted runners that are missing basic tooling required
      # by JavaScript-based GitHub Actions and Terraform setup.
      - name: Preflight runner tools
        timeout-minutes: 5
        run: ${{ github.workspace }}/scripts/require-runner-tools.sh bash bws git kubectl node unzip nc

      # Load the exact Terraform env vars expected by provider and backend
      # configuration from Bitwarden instead of GitHub repository secrets.
      - name: Load Bitwarden secrets
        timeout-minutes: 5
        run: ${{ github.workspace }}/scripts/load-bitwarden-secrets.sh --format github-env terraform

      # Some imported stacks still preserve sensitive live inputs in Kubernetes
      # rather than Bitwarden. Hydrate only the values needed for read-only
      # plans and mask them before Terraform sees the environment.
      - name: Hydrate imported stack plan secrets
        if: matrix.stack_name == 'identity-edge' || matrix.stack_name == 'overlay' || matrix.stack_name == 'observability' || matrix.stack_name == 'apps-unifi'
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${TF_VAR_kubeconfig_path:-}" ]]; then
            echo "TF_VAR_kubeconfig_path is required to hydrate imported stack secrets." >&2
            exit 1
          fi

          write_secret_env() {
            local key="$1"
            local value="$2"

            printf '::add-mask::%s\n' "${value}"

            {
              printf '%s<<__STACK_SECRET_EOF__\n' "${key}"
              printf '%s\n' "${value}"
              printf '__STACK_SECRET_EOF__\n'
            } >> "${GITHUB_ENV}"
          }

          case "${{ matrix.stack_name }}" in
            identity-edge)
              tunnel_secret_b64="$(
                kubectl --kubeconfig "${TF_VAR_kubeconfig_path}" -n networking get secret tunnel-token -o jsonpath='{.data.token}' \
                | base64 -d \
                | base64 -d \
                | node -e 'const fs = require("fs"); const input = fs.readFileSync(0, "utf8").trim(); process.stdout.write(JSON.parse(input).s);'
              )"
              write_secret_env "TF_VAR_tunnel_secret_b64" "${tunnel_secret_b64}"
              ;;
            overlay)
              tailscale_authkey="$(
                kubectl --kubeconfig "${TF_VAR_kubeconfig_path}" -n infra-tailscale get secret tailscale-auth -o jsonpath='{.data.TS_AUTHKEY}' \
                | base64 -d
              )"
              write_secret_env "TF_VAR_tailscale_authkey" "${tailscale_authkey}"
              ;;
            observability)
              unpoller_username="$(
                kubectl --kubeconfig "${TF_VAR_kubeconfig_path}" -n monitoring get secret unpoller -o jsonpath='{.data.UP_UNIFI_DEFAULT_USER}' \
                | base64 -d
              )"
              unpoller_password="$(
                kubectl --kubeconfig "${TF_VAR_kubeconfig_path}" -n monitoring get secret unpoller -o jsonpath='{.data.UP_UNIFI_DEFAULT_PASS}' \
                | base64 -d
              )"
              write_secret_env "TF_VAR_unpoller_username" "${unpoller_username}"
              write_secret_env "TF_VAR_unpoller_password" "${unpoller_password}"
              ;;
            apps-unifi)
              mongo_root_password="$(
                kubectl --kubeconfig "${TF_VAR_kubeconfig_path}" -n unifi get secret unifi-mongo-secret-289546e9 -o jsonpath='{.data.mongo-root-password}' \
                | base64 -d
              )"
              write_secret_env "TF_VAR_mongo_root_password" "${mongo_root_password}"
              ;;
          esac

      # Verify that the runner can reach the remote state backend for every
      # stack and the RouterOS control plane when the network-core stack runs.
      - name: Preflight network access
        timeout-minutes: 5
        shell: bash
        run: |
          nc -zvw5 3b4089f3bd57e01c9d7c03c2587c3436.r2.cloudflarestorage.com 443 || { echo "Cannot reach Cloudflare R2 endpoint on port 443"; exit 1; }

          case "${{ matrix.stack_name }}" in
            network-core)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              nc -zvw5 10.1.100.2 443 || { echo "Cannot reach MikroTik Switch 1PP on port 443"; exit 1; }
              nc -zvw5 10.1.100.3 443 || { echo "Cannot reach MikroTik Switch 1NP on port 443"; exit 1; }
              ;;
            network-core-interfaces-gw)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              ;;
            network-core-interfaces-switch-1pp)
              nc -zvw5 10.1.100.2 443 || { echo "Cannot reach MikroTik Switch 1PP on port 443"; exit 1; }
              ;;
            network-core-interfaces-switch-1np)
              nc -zvw5 10.1.100.3 443 || { echo "Cannot reach MikroTik Switch 1NP on port 443"; exit 1; }
              ;;
            network-core-dhcp)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              ;;
            network-core-routing)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              ;;
          esac

      # Install a pinned Terraform version so local and CI behavior stay aligned.
      - name: Setup Terraform
        timeout-minutes: 5
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.8

      # Reuse provider downloads across validation jobs on the persistent
      # self-hosted runner so repeated init steps avoid redundant downloads.
      - name: Prepare Terraform plugin cache
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          plugin_cache_dir="${HOME}/.terraform.d/plugin-cache"
          mkdir -p "${plugin_cache_dir}"
          chmod 700 "${HOME}/.terraform.d" "${plugin_cache_dir}"
          echo "TF_PLUGIN_CACHE_DIR=${plugin_cache_dir}" >> "${GITHUB_ENV}"

      # Keep formatting enforcement simple and consistent across all stacks.
      - name: Check Terraform formatting
        timeout-minutes: 5
        run: terraform fmt -check -recursive

      # Install providers, initialize the R2 backend, and validate each stack
      # against the same remote-state backend used outside CI.
      - name: Terraform init
        timeout-minutes: 10
        run: terraform init -reconfigure

      # Validate the selected stack structure and provider configuration.
      - name: Terraform validate
        timeout-minutes: 10
        run: terraform validate

      # Produce a real read-only plan only for stacks with committed non-secret
      # source of truth so CI can show intended infrastructure changes without
      # competing for the backend lock used by applies and manual state work.
      - name: Terraform plan
        if: matrix.enable_plan
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail

          plan_args=(-lock=false -no-color -out=tfplan)
          if [[ "${{ matrix.stack_name }}" == "network-core-routing" ]]; then
            # The MikroTik REST API is sensitive to refresh burst load, so
            # serialize provider refreshes for this stack to reduce transient
            # timeout failures in CI while preserving a real refreshed plan.
            plan_args+=(-parallelism=1)
          fi

          for attempt in 1 2 3; do
            if terraform plan "${plan_args[@]}"; then
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 15))
              echo "Terraform plan failed on attempt ${attempt}; retrying in ${sleep_seconds}s"
              sleep "${sleep_seconds}"
            fi
          done

          echo "Terraform plan failed after 3 attempts"
          exit 1

      # Convert the binary plan to plain text so it can be reviewed from CI
      # without rerunning Terraform locally.
      - name: Render Terraform plan
        if: matrix.enable_plan
        timeout-minutes: 5
        run: terraform show -no-color tfplan > tfplan.txt

      # Publish the plan text as a short-lived workflow artifact for review.
      - name: Upload Terraform plan artifact
        if: matrix.enable_plan
        timeout-minutes: 5
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-${{ matrix.stack_name }}
          path: ${{ matrix.stack }}/tfplan.txt
          retention-days: 1

  apply:
    name: Apply ${{ matrix.stack }}
    runs-on: self-hosted
    needs:
      - detect-changes
      - validate
    if: needs.detect-changes.outputs.has_apply_changes == 'true'
    timeout-minutes: 60
    # Serialize mutating runs per stack so separate branch and main executions
    # cannot apply against the same Terraform root at the same time.
    concurrency:
      group: terraform-apply-${{ matrix.stack_name }}
      cancel-in-progress: false
    env:
      # Keep the stable backend region in workflow config because it is a
      # non-secret compatibility value rather than credential material.
      AWS_REGION: auto
    strategy:
      fail-fast: false
      # Applies stay single-lane so the self-hosted runner and live devices do
      # not absorb several concurrent state changes at once.
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect-changes.outputs.apply_matrix) }}

    defaults:
      run:
        working-directory: ${{ matrix.stack }}

    steps:
      # Check out the repository before loading secrets so the shared helper can
      # be reused by local runs and all CI workflows without duplication.
      - name: Checkout repository
        timeout-minutes: 5
        uses: actions/checkout@v6.0.2

      # Fail fast on self-hosted runners that are missing the tooling required
      # to execute Terraform applies consistently.
      - name: Preflight runner tools
        timeout-minutes: 5
        run: ${{ github.workspace }}/scripts/require-runner-tools.sh bash bws git node unzip nc

      # Load the exact Terraform env vars expected by provider and backend
      # configuration from Bitwarden instead of GitHub repository secrets.
      - name: Load Bitwarden secrets
        timeout-minutes: 5
        run: ${{ github.workspace }}/scripts/load-bitwarden-secrets.sh --format github-env terraform

      # Verify network reachability again in the deployment job so apply fails
      # fast before touching remote state or device APIs.
      - name: Preflight network access
        timeout-minutes: 5
        shell: bash
        run: |
          nc -zvw5 3b4089f3bd57e01c9d7c03c2587c3436.r2.cloudflarestorage.com 443 || { echo "Cannot reach Cloudflare R2 endpoint on port 443"; exit 1; }

          case "${{ matrix.stack_name }}" in
            network-core)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              nc -zvw5 10.1.100.2 443 || { echo "Cannot reach MikroTik Switch 1PP on port 443"; exit 1; }
              nc -zvw5 10.1.100.3 443 || { echo "Cannot reach MikroTik Switch 1NP on port 443"; exit 1; }
              ;;
            network-core-interfaces-gw)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              ;;
            network-core-interfaces-switch-1pp)
              nc -zvw5 10.1.100.2 443 || { echo "Cannot reach MikroTik Switch 1PP on port 443"; exit 1; }
              ;;
            network-core-interfaces-switch-1np)
              nc -zvw5 10.1.100.3 443 || { echo "Cannot reach MikroTik Switch 1NP on port 443"; exit 1; }
              ;;
            network-core-dhcp)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              ;;
            network-core-routing)
              nc -zvw5 10.1.100.1 443 || nc -zvw5 10.1.100.1 80 || { echo "Cannot reach MikroTik GW on port 443 or 80"; exit 1; }
              ;;
          esac

      # Install a pinned Terraform version so local and CI behavior stay aligned.
      - name: Setup Terraform
        timeout-minutes: 5
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.8

      # Reuse provider downloads across apply runs on the persistent runner so
      # validation and apply do not keep redownloading identical plugins.
      - name: Prepare Terraform plugin cache
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          plugin_cache_dir="${HOME}/.terraform.d/plugin-cache"
          mkdir -p "${plugin_cache_dir}"
          chmod 700 "${HOME}/.terraform.d" "${plugin_cache_dir}"
          echo "TF_PLUGIN_CACHE_DIR=${plugin_cache_dir}" >> "${GITHUB_ENV}"

      # Reinitialize the backend in the apply job so state operations use fresh
      # provider and backend configuration.
      - name: Terraform init
        timeout-minutes: 10
        run: terraform init -reconfigure

      # Apply the committed desired state for CI-ready stacks after validation
      # succeeds on the same revision.
      - name: Terraform apply
        timeout-minutes: 30
        run: terraform apply -auto-approve -no-color
