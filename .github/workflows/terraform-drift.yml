name: Terraform Drift

on:
  workflow_dispatch:
  schedule:
    # Run twice daily on a fixed UTC schedule at a stable non-zero minute to
    # avoid top-of-hour congestion. GitHub Actions cron is UTC-only, so the
    # Prague-local run time shifts by one hour when daylight saving changes.
    - cron: "17 6,18 * * *"

# Cancel obsolete drift runs for the same ref so a slow or stuck schedule does
# not leave the self-hosted runner busy with stale read-only work.
concurrency:
  group: terraform-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Drift check ${{ matrix.stack }}
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      # Keep the stable backend region in workflow config because it is a
      # non-secret compatibility value rather than credential material.
      AWS_REGION: auto
    strategy:
      fail-fast: false
      # Keep the coverage unchanged while limiting parallel plans so the
      # self-hosted runner does not absorb all drift-covered stacks at once.
      max-parallel: 2
      matrix:
        include:
          # Keep the twice-daily drift workflow limited to stacks that have
          # committed non-secret inputs, completed state onboarding, and are
          # safe to run unattended in CI.
          - stack: terraform/stacks/network-core
            stack_name: network-core
            kubeconfig_secret_names: KUBECONFIG_CONTENT,HOME_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_HOME
          - stack: terraform/stacks/network-core/interfaces/gw
            stack_name: network-core-interfaces-gw
            kubeconfig_secret_names: KUBECONFIG_CONTENT,HOME_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_HOME
          - stack: terraform/stacks/network-core/interfaces/switch-1pp
            stack_name: network-core-interfaces-switch-1pp
            kubeconfig_secret_names: KUBECONFIG_CONTENT,HOME_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_HOME
          - stack: terraform/stacks/network-core/interfaces/switch-1np
            stack_name: network-core-interfaces-switch-1np
            kubeconfig_secret_names: KUBECONFIG_CONTENT,HOME_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_HOME
          - stack: terraform/stacks/network-core/dhcp
            stack_name: network-core-dhcp
            kubeconfig_secret_names: KUBECONFIG_CONTENT,HOME_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_HOME
          - stack: terraform/stacks/network-core/routing
            stack_name: network-core-routing
            kubeconfig_secret_names: KUBECONFIG_CONTENT,HOME_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_HOME
          - stack: terraform/stacks/platform-k3s
            stack_name: platform-k3s
            kubeconfig_secret_names: K3S_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_K3S,KUBECONFIG_CONTENT
          - stack: terraform/stacks/dns-blocky-k3s
            stack_name: dns-blocky-k3s
            kubeconfig_secret_names: K3S_KUBECONFIG_CONTENT,KUBECONFIG_CONTENT_K3S,KUBECONFIG_CONTENT

    defaults:
      run:
        working-directory: ${{ matrix.stack }}

    steps:
      # Check out the repository before loading secrets so the shared helper can
      # be reused by local runs and all CI workflows without duplication.
      - name: Checkout repository
        timeout-minutes: 5
        uses: actions/checkout@v6.0.2

      # Fail fast on self-hosted runners that are missing the tools required by
      # JavaScript-based GitHub Actions and Terraform setup.
      - name: Preflight runner tools
        timeout-minutes: 5
        run: ${{ github.workspace }}/scripts/require-runner-tools.sh bash bws curl git node unzip nc

      # Load the exact Terraform env vars expected by provider and backend
      # configuration from Bitwarden instead of GitHub repository secrets.
      - name: Load Bitwarden secrets
        id: load_bitwarden_secrets
        timeout-minutes: 5
        run: ${{ github.workspace }}/scripts/load-bitwarden-secrets.sh --format github-env --kubeconfig-secret-names "${{ matrix.kubeconfig_secret_names }}" terraform

      # Require Telegram settings in this workflow so drift and failure events
      # do not silently disappear after the feature is introduced.
      - name: Validate Telegram notification settings
        id: validate_telegram_settings
        timeout-minutes: 5
        run: |
          [[ -n "${TELEGRAM_BOT_TOKEN:-}" ]] || { echo "Missing TELEGRAM_BOT_TOKEN in Bitwarden output."; exit 1; }
          [[ -n "${TELEGRAM_CHAT_ID:-}" ]] || { echo "Missing TELEGRAM_CHAT_ID in Bitwarden output."; exit 1; }

      # Verify that the runner can reach the remote state backend and the
      # RouterOS control plane before Terraform tries to read live state.
      - name: Preflight network access
        timeout-minutes: 5
        shell: bash
        run: |
          nc -zvw5 3b4089f3bd57e01c9d7c03c2587c3436.r2.cloudflarestorage.com 443 || { echo "Cannot reach Cloudflare R2 endpoint on port 443"; exit 1; }
          case "${{ matrix.stack_name }}" in
            network-core)
              nc -zvw5 10.1.100.1 443 || { echo "Cannot reach MikroTik GW on port 443"; exit 1; }
              nc -zvw5 10.1.100.2 443 || { echo "Cannot reach MikroTik Switch 1PP on port 443"; exit 1; }
              nc -zvw5 10.1.100.3 443 || { echo "Cannot reach MikroTik Switch 1NP on port 443"; exit 1; }
              ;;
            network-core-interfaces-gw)
              nc -zvw5 10.1.100.1 443 || { echo "Cannot reach MikroTik GW on port 443"; exit 1; }
              ;;
            network-core-interfaces-switch-1pp)
              nc -zvw5 10.1.100.2 443 || { echo "Cannot reach MikroTik Switch 1PP on port 443"; exit 1; }
              ;;
            network-core-interfaces-switch-1np)
              nc -zvw5 10.1.100.3 443 || { echo "Cannot reach MikroTik Switch 1NP on port 443"; exit 1; }
              ;;
            network-core-dhcp)
              nc -zvw5 10.1.100.1 443 || { echo "Cannot reach MikroTik GW on port 443"; exit 1; }
              ;;
            network-core-routing)
              nc -zvw5 10.1.100.1 443 || { echo "Cannot reach MikroTik GW on port 443"; exit 1; }
              ;;
          esac

      # Install a pinned Terraform version so local and CI behavior stay aligned.
      # Disable the setup action wrapper here because the drift workflow relies
      # on Terraform's native detailed exit codes to distinguish clean runs
      # from real drift, and the wrapper can mask that signal.
      - name: Setup Terraform
        timeout-minutes: 5
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      # Reuse provider downloads across drift runs on the persistent runner so
      # repeated init steps spend less time fetching identical plugins.
      - name: Prepare Terraform plugin cache
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          # Avoid cross-stack cache write races between concurrent drift jobs by
          # isolating provider cache directories per Terraform stack.
          plugin_cache_dir="${HOME}/.terraform.d/plugin-cache/${{ matrix.stack_name }}"
          mkdir -p "${plugin_cache_dir}"
          chmod 700 "${HOME}/.terraform.d"
          find "${HOME}/.terraform.d/plugin-cache" -mindepth 1 -maxdepth 1 -type d -exec chmod 700 {} \;
          echo "TF_PLUGIN_CACHE_DIR=${plugin_cache_dir}" >> "${GITHUB_ENV}"

      # Reinitialize the backend so the drift check uses the same remote state
      # configuration as interactive Terraform runs.
      - name: Terraform init
        timeout-minutes: 10
        run: terraform init -reconfigure

      # Use Terraform's detailed exit codes so the workflow can distinguish
      # between a clean state, detected drift, and a real execution failure.
      # Drift checks are read-only, so skip backend locking to avoid blocking
      # on concurrent applies or manual maintenance operations.
      - name: Terraform drift plan
        id: drift_plan
        timeout-minutes: 20
        shell: bash
        run: |
          set +e
          terraform plan -input=false -lock=false -detailed-exitcode -no-color -out=tfplan
          terraform_exit_code=$?
          set -e

          case "${terraform_exit_code}" in
            0)
              echo "drift_detected=false" >> "${GITHUB_OUTPUT}"
              ;;
            2)
              echo "drift_detected=true" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Terraform plan failed with exit code ${terraform_exit_code}."
              exit "${terraform_exit_code}"
              ;;
          esac

      # Render the binary plan only when drift exists so reviewers can inspect
      # the detected difference directly from the Actions artifact.
      - name: Render drift plan
        if: steps.drift_plan.outputs.drift_detected == 'true'
        timeout-minutes: 5
        run: terraform show -no-color tfplan > tfplan.txt

      # Publish the human-readable drift plan as a short-lived artifact before
      # failing the job so the scheduled run remains actionable instead of just
      # red.
      - name: Upload drift artifact
        if: steps.drift_plan.outputs.drift_detected == 'true'
        timeout-minutes: 5
        uses: actions/upload-artifact@v7
        with:
          name: terraform-drift-${{ matrix.stack_name }}
          path: ${{ matrix.stack }}/tfplan.txt
          retention-days: 1

      # Notify Telegram before the deliberate drift failure so operators get an
      # actionable message with the affected stack and a direct run link.
      - name: Notify Telegram on drift
        if: steps.drift_plan.outputs.drift_detected == 'true'
        timeout-minutes: 5
        env:
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat <<EOF | ${{ github.workspace }}/scripts/send-telegram-message.sh
          Terraform Drift: drift detected
          Stack: ${{ matrix.stack_name }}
          Artifact: terraform-drift-${{ matrix.stack_name }}
          Run: ${WORKFLOW_RUN_URL}
          EOF

      # Mark the run failed after artifact upload so drift is visible from the
      # workflow status page and scheduled run history.
      - name: Fail when drift is detected
        if: steps.drift_plan.outputs.drift_detected == 'true'
        timeout-minutes: 5
        run: |
          echo "Terraform drift detected for ${{ matrix.stack_name }}."
          exit 1

      # Notify on non-drift workflow failures after Bitwarden has already
      # loaded the Telegram settings needed for message delivery.
      - name: Notify Telegram on workflow failure
        if: failure() && steps.load_bitwarden_secrets.outcome == 'success' && steps.validate_telegram_settings.outcome == 'success' && steps.drift_plan.outputs.drift_detected != 'true'
        continue-on-error: true
        timeout-minutes: 5
        env:
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat <<EOF | ${{ github.workspace }}/scripts/send-telegram-message.sh
          Terraform Drift: workflow failure
          Stack: ${{ matrix.stack_name }}
          Run: ${WORKFLOW_RUN_URL}
          EOF
