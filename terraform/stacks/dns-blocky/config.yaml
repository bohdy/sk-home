upstreams:
  groups:
    default:
      - 8.8.8.8

blocking:
  denylists:
    ads:
      - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
  clientGroupsBlock:
    default:
      - ads

ports:
  dns: 53
  http: 4000

log:
  level: info
  format: text

# Custom DNS mappings
# To add per-client overrides in the future, use conditional blocks
customDNS:
  customTTL: 5m
  mapping:
    # Internal hostnames
    unifi.sk.bohdal.name: 10.1.30.0
    unifi.ap.sk.bohdal.name: 10.1.30.1
    traefik.bohdal.name: 10.1.30.0
    sk.bohdal.name: 10.1.30.0
    # Split-brain DNS: public hostname resolves to internal IP
    # Both internal and tailscale clients get the same answer (for now)
    unifi.bohdal.name: 10.1.30.0
    grafana.bohdal.name: 10.1.30.0
    # NAS - internal IP (for Tailscale clients, add 100.125.204.108 in Tailscale MagicDNS)
    nas.bohdal.name: 10.1.100.10
    gw.bohdal.name: 10.1.100.1
    sw-1pp.bohdal.name: 10.1.100.2
    sw-1np.bohdal.name: 10.1.100.3
    # ufoun.sh
    fw.ufoun.sh.cvut.cz: 10.2.1.1
