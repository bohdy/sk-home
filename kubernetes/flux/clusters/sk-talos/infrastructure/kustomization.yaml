# The bootstrap path applies Flux orchestration objects; each infrastructure
# concern reconciles separately so dependencies and status stay explicit.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster-policy-kustomization.yaml
  - cilium-kustomization.yaml
  - cert-manager-kustomization.yaml
  - certificates-kustomization.yaml
  - storage-synology-csi-kustomization.yaml
  - dns-kustomization.yaml
