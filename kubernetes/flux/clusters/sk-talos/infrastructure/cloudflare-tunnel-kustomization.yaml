# The outbound connector depends only on shared policy and working Cilium
# networking; application routes are managed independently.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-tunnel
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./kubernetes/flux/infrastructure/cloudflare-tunnel
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: cluster-policy
    - name: cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
