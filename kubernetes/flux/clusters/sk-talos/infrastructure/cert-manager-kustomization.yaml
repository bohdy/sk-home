# Install cert-manager after shared cluster policy; it requires working cluster
# networking but has no dependency on workload storage or DNS publication.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./kubernetes/flux/infrastructure/cert-manager
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: cluster-policy
    - name: cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
