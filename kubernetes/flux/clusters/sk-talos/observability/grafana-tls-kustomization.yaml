# Issue Grafana's certificate only after its namespace and production
# ClusterIssuer are Ready; later exposure work depends on this component.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-grafana-tls
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./kubernetes/flux/observability/grafana-tls
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: certificates
    - name: observability-metrics
  sourceRef:
    kind: GitRepository
    name: flux-system
