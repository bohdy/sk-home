# Synthetic probing depends on the metrics operator and VMAgent that consume
# its VMServiceScrape and VMStaticScrape resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-blackbox
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  retryInterval: 2m
  path: ./kubernetes/flux/observability/blackbox
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: observability-metrics
    - name: cilium
