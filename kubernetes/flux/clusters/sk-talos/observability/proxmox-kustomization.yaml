# Proxmox export depends on the metrics operator and Cilium policy enforcement
# that consume and constrain its multi-target scrape endpoint.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-proxmox
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  retryInterval: 2m
  path: ./kubernetes/flux/observability/proxmox
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: observability-metrics
    - name: cilium
    - name: dns
