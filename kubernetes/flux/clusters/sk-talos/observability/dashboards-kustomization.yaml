# Dashboard provisioning depends only on Grafana and its VictoriaMetrics
# datasource; panels for later collectors may remain empty until enabled.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-dashboards
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/flux/observability/dashboards
  dependsOn:
    - name: observability-metrics
    - name: observability-network-metrics
