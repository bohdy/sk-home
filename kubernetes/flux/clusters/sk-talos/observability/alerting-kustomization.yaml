# Alerting depends on every currently monitored backend so its first evaluation
# sees complete scrape coverage rather than transient missing-series failures.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-alerting
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  retryInterval: 2m
  path: ./kubernetes/flux/observability/alerting
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager
    - name: observability-metrics
    - name: observability-logs
    - name: observability-vector
    - name: observability-blackbox
    - name: observability-snmp
