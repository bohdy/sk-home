# Establish shared namespace policy before certificates or workloads create
# namespace-scoped resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-base
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./kubernetes/flux/observability/base
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: cluster-policy
  sourceRef:
    kind: GitRepository
    name: flux-system
