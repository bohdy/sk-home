# Network scrape objects require both their source workloads and the
# VictoriaMetrics operator CRDs to exist before reconciliation.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-network-metrics
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/flux/observability/network-metrics
  dependsOn:
    - name: cilium
    - name: dns
    - name: observability-metrics
