# Metrics starts only after storage, networking, the namespace, and Grafana's
# certificate are healthy because its retained claims and TLS mount require
# those foundations before dependent logging is introduced.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-metrics
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./kubernetes/flux/observability/metrics
  prune: true
  wait: true
  timeout: 20m
  dependsOn:
    - name: cluster-policy
    - name: cilium
    - name: storage-synology-csi
    - name: observability-base
    - name: observability-grafana-tls
  sourceRef:
    kind: GitRepository
    name: flux-system
