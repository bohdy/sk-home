# Stage UniFi privately first: storage and Cilium must be ready, but this stage
# intentionally has neither a device-facing LoadBalancer nor public routing.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unifi
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 10m
  path: ./kubernetes/flux/apps/unifi
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cilium
    - name: storage-synology-csi
