# This manifest was generated by Flux and uses public read-only HTTPS so the
# cluster does not need a GitHub deploy credential for this public repository.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  url: https://github.com/bohdy/sk-home
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/flux/clusters/sk-talos
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
