# The driver runs in its own namespace because it needs privileged node access
# and DSM credentials that should not be mixed with application namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: synology-csi
  labels:
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
