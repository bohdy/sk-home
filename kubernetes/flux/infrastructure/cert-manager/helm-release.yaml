# Flux owns the cert-manager release and its CRDs so certificate APIs are
# upgraded together with the controllers that reconcile them.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: cert-manager
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  values:
    crds:
      enabled: true
