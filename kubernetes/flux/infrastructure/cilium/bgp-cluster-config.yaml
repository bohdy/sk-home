# Every Linux node gets one local BGP instance and opens an iBGP session to the
# gateway. Cilium derives the node-side source address from node networking.
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: mikrotik-gw
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: instance-65001
      localASN: 65001
      peers:
        - name: mikrotik-gw
          peerASN: 65001
          peerAddress: 10.1.20.1
          peerConfigRef:
            name: mikrotik-gw
