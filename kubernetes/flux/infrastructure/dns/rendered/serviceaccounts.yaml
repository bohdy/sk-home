# DNS components do not need Kubernetes API access, so each gets a dedicated
# identity with token mounting disabled and no RBAC bindings.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blocky
  namespace: dns-system
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coredns
  namespace: dns-system
automountServiceAccountToken: false
