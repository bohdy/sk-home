apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-corefile
  namespace: dns-system
data:
  Corefile: |
    # One CoreDNS instance handles internal zones, reverse zones, and public
    # recursion. The file plugin falls through for unknown bohdal.name records so
    # public split-DNS records can still resolve through DNS4EU.
    .:1053 {
        errors
        health :8080
        ready :8181
        prometheus :9153

        file /zones/bohdal.name.zone bohdal.name {
            reload 30s
            fallthrough
        }
        file /zones/30.1.10.in-addr.arpa.zone 30.1.10.in-addr.arpa {
            reload 30s
        }
        file /zones/100.1.10.in-addr.arpa.zone 100.1.10.in-addr.arpa {
            reload 30s
        }

        forward . tls://86.54.11.13 tls://86.54.11.213 {
            tls_servername noads.joindns4.eu
            health_check 5s
            policy round_robin
        }

        cache {
            success 9984 300 5
            denial 9984 60 5
        }
    }
