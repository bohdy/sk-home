apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-zones
  namespace: dns-system
data:
  100.1.10.in-addr.arpa.zone: |
    $ORIGIN 100.1.10.in-addr.arpa.
    $TTL 300
    @ IN SOA dns.bohdal.name. hostmaster.bohdal.name. (
        2026060901 ; serial
        300        ; refresh
        120        ; retry
        1209600    ; expire
        60         ; negative cache TTL
    )
    @ IN NS  dns.bohdal.name.
    1 IN PTR gw.bohdal.name.
  30.1.10.in-addr.arpa.zone: |
    $ORIGIN 30.1.10.in-addr.arpa.
    $TTL 300
    @ IN SOA dns.bohdal.name. hostmaster.bohdal.name. (
        2026060901 ; serial
        300        ; refresh
        120        ; retry
        1209600    ; expire
        60         ; negative cache TTL
    )
    @  IN NS  dns.bohdal.name.
    53 IN PTR dns.bohdal.name.
  bohdal.name.zone: |
    $ORIGIN bohdal.name.
    $TTL 300
    @ IN SOA dns.bohdal.name. hostmaster.bohdal.name. (
        2026060901 ; serial
        300        ; refresh
        120        ; retry
        1209600    ; expire
        60         ; negative cache TTL
    )
    @      IN NS dns.bohdal.name.
    dns    IN A  10.1.30.53
    blocky IN A  10.1.30.53
    gw     IN A  10.1.100.1
