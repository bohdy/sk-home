apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-zones
  namespace: dns-system
data:
  100.1.10.in-addr.arpa.zone: |
    $ORIGIN 100.1.10.in-addr.arpa.
    $TTL 300
    @ IN SOA dns.bohdal.name. hostmaster.bohdal.name. (
        2026072201 ; serial
        300        ; refresh
        120        ; retry
        1209600    ; expire
        60         ; negative cache TTL
    )
    @ IN NS  dns.bohdal.name.
    1 IN PTR gw.bohdal.name.
    201 IN PTR pve.sk.bohdal.name.
  30.1.10.in-addr.arpa.zone: |
    $ORIGIN 30.1.10.in-addr.arpa.
    $TTL 300
    @ IN SOA dns.bohdal.name. hostmaster.bohdal.name. (
        2026072001 ; serial
        300        ; refresh
        120        ; retry
        1209600    ; expire
        60         ; negative cache TTL
    )
    @  IN NS  dns.bohdal.name.
    53 IN PTR dns.bohdal.name.
    55 IN PTR grafana.bohdal.name.
  bohdal.name.zone: |
    $ORIGIN bohdal.name.
    $TTL 300
    @ IN SOA dns.bohdal.name. hostmaster.bohdal.name. (
        2026072301 ; serial
        300        ; refresh
        120        ; retry
        1209600    ; expire
        60         ; negative cache TTL
    )
    @      IN NS dns.bohdal.name.
    dns    IN A  10.1.30.53
    blocky IN A  10.1.30.53
    grafana IN A 10.1.30.55
    grafana.internal IN A 10.1.30.55
    gw     IN A  10.1.100.1
    ; The Brother printer receives this address from the MikroTik DHCP reservation.
    printer.sk IN A  10.1.10.13
    pve.sk IN A  10.1.100.201
