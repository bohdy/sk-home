# Keep at least one CoreDNS replica available during voluntary disruptions.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coredns
  namespace: dns-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coredns
      app.kubernetes.io/component: dns-authority
