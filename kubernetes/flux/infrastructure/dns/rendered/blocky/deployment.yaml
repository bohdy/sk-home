# Blocky listens on an unprivileged container port; Services expose standard
# DNS port 53 without requiring the container to hold NET_BIND_SERVICE.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocky
  namespace: dns-system
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: dns-front
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blocky
      app.kubernetes.io/component: dns-front
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blocky
        app.kubernetes.io/component: dns-front
      annotations:
        sk-home/config-checksum: "18c14c1fcd60e05301ce08d3eed9f29506ce3ad5d8a47b0437160755c7d06e27"
    spec:
      serviceAccountName: blocky
      automountServiceAccountToken: false
      priorityClassName: sk-home-critical
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: blocky
              app.kubernetes.io/component: dns-front
      containers:
        - name: blocky
          # Blocky v0.29.0 linux/amd64 manifest.
          image: ghcr.io/0xerr0r/blocky:v0.29.0@sha256:a3262b2c478d62064346c1d7aa2af99701b1366356955fc9f062e17e3d8c8849
          imagePullPolicy: IfNotPresent
          env:
            - name: BLOCKY_CONFIG_FILE
              value: /config/config.yml
          ports:
            - name: dns
              containerPort: 1053
              protocol: UDP
            - name: dns-tcp
              containerPort: 1053
              protocol: TCP
            - name: http
              containerPort: 4000
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: blocky-config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: blocky-config
          configMap:
            name: blocky-config
        - name: tmp
          emptyDir: {}
