# Pin the exact controller digest that produced the verified native backup.
# Restoring into the same application build avoids coupling this migration to a
# controller upgrade; upgrade evaluation happens only after cutover acceptance.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-controller
  namespace: unifi
  labels:
    app.kubernetes.io/name: unifi-controller
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-controller
    spec:
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: unifi-controller
          image: linuxserver/unifi-network-application@sha256:f86da30498d3f6c00b403e6d2e32dfd012b531f87cad5bd9a270c35aceedbd7a
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Prague
            - name: MEM_LIMIT
              value: "2048"
            - name: MEM_STARTUP
              value: "2048"
            - name: MONGO_HOST
              value: unifi-mongodb
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_DBNAME
              value: unifi
            - name: MONGO_AUTHSOURCE
              value: admin
            - name: MONGO_USER
              value: unifi
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-mongodb-application-auth
                  key: application-password
          ports:
            - name: https-console
              containerPort: 8443
              protocol: TCP
            - name: inform
              containerPort: 8080
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
            - name: discovery
              containerPort: 10001
              protocol: UDP
          readinessProbe:
            tcpSocket:
              port: https-console
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: https-console
            initialDelaySeconds: 180
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: unifi-config
