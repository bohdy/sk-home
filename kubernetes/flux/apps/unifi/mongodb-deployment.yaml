# A single MongoDB replica is sufficient for this homelab controller. The
# application backup remains the migration/recovery unit; this deployment does
# not claim to provide database high availability.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-mongodb
  namespace: unifi
  labels:
    app.kubernetes.io/name: unifi-mongodb
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-mongodb
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mongodb
          image: mongo:8.0.28@sha256:0b9ff6be307c4860f66d9555cd951c9fa13fdb6536d9dd808c137dcdc6d888a5
          imagePullPolicy: IfNotPresent
          args:
            - --wiredTigerCacheSizeGB
            - "0.5"
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unifi-mongodb-auth
                  key: mongo-root-password
            - name: MONGO_APP_USERNAME
              value: unifi
            - name: MONGO_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unifi-mongodb-application-auth
                  key: application-password
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: mongodb
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mongodb
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # The official entrypoint assigns the retained data directory to
              # its database user, then drops to that user before MongoDB
              # starts. It needs no other ambient Linux capability.
              add:
                - CHOWN
                - DAC_OVERRIDE
                - SETGID
                - SETUID
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: init
              mountPath: /docker-entrypoint-initdb.d/init-mongo.sh
              subPath: init-mongo.sh
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: unifi-mongodb
        - name: init
          configMap:
            name: unifi-mongodb-init
            defaultMode: 0555
