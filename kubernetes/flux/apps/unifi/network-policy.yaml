# The controller accepts node-originated console checks and LAN device traffic
# only on UniFi's inform, STUN, and discovery ports. The console itself remains
# private until a separately accepted public-routing change exposes it.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: unifi-controller-stage
  namespace: unifi
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: unifi-controller
  ingress:
    # Kubelet probes and kubectl port-forward traffic originate from nodes.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
    # Preserve the original AP source address through the fixed VIP while
    # limiting device communication to the home-network trust boundary.
    - fromCIDR:
        - 10.0.0.0/8
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "3478"
              protocol: UDP
            - port: "10001"
              protocol: UDP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: unifi
            k8s:app.kubernetes.io/name: unifi-mongodb
      toPorts:
        - ports:
            - port: "27017"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# MongoDB accepts only the controller and node-originated health probes. It has
# no egress requirements during this stage and remains unreachable externally.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: unifi-mongodb-stage
  namespace: unifi
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: unifi-mongodb
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: unifi
            k8s:app.kubernetes.io/name: unifi-controller
      toPorts:
        - ports:
            - port: "27017"
              protocol: TCP
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "27017"
              protocol: TCP
