# Flux pulls the pinned official VictoriaLogs Single chart from the vendor OCI
# registry so chart acquisition does not depend on a mutable Helm index.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs-single
  namespace: observability
spec:
  interval: 30m
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-single
  ref:
    tag: 0.13.9
