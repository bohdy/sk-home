# Network telemetry is kept separate from the vendor stack so Cilium and DNS
# ownership remain unchanged while VictoriaMetrics owns only discovery.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cilium-vm-pod-scrapes.yaml
  - hubble-vm-service-scrape.yaml
  - blocky-vm-service-scrape.yaml
