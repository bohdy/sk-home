# Preserve the gateway's stable inventory identity while sending each scrape
# through the shared multi-target exporter with RouterOS-compatible SNMPv3.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: snmp-mikrotik-gateway
  namespace: observability
spec:
  jobName: snmp-mikrotik-gateway
  targetEndpoints:
    - targets:
        - 10.1.100.1
      labels:
        instance: mikrotik-gw
        vendor: mikrotik
        availability: always-on
      path: /snmp
      params:
        auth:
          - snmp_v3_routeros
        module:
          - system
          - if_mib
          - mikrotik
      interval: 60s
      scrapeTimeout: 30s
      sampleLimit: 10000
      seriesLimit: 10000
      relabelConfigs:
        - sourceLabels:
            - __address__
          targetLabel: __param_target
        - targetLabel: __address__
          replacement: snmp-exporter.observability.svc.cluster.local.:9116
