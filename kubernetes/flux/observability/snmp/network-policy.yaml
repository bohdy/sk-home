# Restrict the multi-target endpoint to VMAgent and permit only ordinary SNMP
# polling toward the accepted private homelab address range.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: snmp-exporter
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vmagent
      ports:
        - port: 9116
          protocol: TCP
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 161
          protocol: UDP
