# Scrape the exporter's own process metrics separately from proxied device
# metrics so configuration and collection failures remain observable.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: snmp-exporter
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      sampleLimit: 2000
      seriesLimit: 2000
