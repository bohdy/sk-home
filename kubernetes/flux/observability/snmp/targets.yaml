# This explicit inventory is the source of truth for external SNMP polling.
# A target becomes scrapeable only after every blocker is removed and enabled
# is set to true in the same change that adds its VMStaticScrape endpoint.
schema_version: 1
targets:
  - name: mikrotik-gw
    # RouterOS exposes SNMP on its routed gateway address; the separate
    # 10.1.100.1 management address rejects UDP/161.
    address: 10.1.20.1
    vendor: mikrotik
    modules:
      - system
      - if_mib
      - mikrotik
    interval: 60s
    availability: always-on
    address_stability: static
    auth_profile: snmp_v3_routeros
    enabled: true
    blockers: []

  - name: synology
    address: 10.1.100.10
    vendor: synology
    modules:
      - system
      - if_mib
      - synology
    interval: 60s
    availability: always-on
    address_stability: static
    auth_profile: pending
    enabled: false
    blockers:
      - confirm-auth-profile
      - bootstrap-auth-secret

  - name: unifi-ap-1pp
    address: 10.1.102.10
    vendor: ubiquiti
    modules:
      - system
      - if_mib
      - ubiquiti_unifi
    interval: 60s
    availability: always-on
    address_stability: static-dhcp
    auth_profile: pending
    enabled: false
    blockers:
      - confirm-auth-profile
      - bootstrap-auth-secret

  - name: unifi-ap-1np
    address: 10.1.102.11
    vendor: ubiquiti
    modules:
      - system
      - if_mib
      - ubiquiti_unifi
    interval: 60s
    availability: always-on
    address_stability: static-dhcp
    auth_profile: pending
    enabled: false
    blockers:
      - confirm-auth-profile
      - bootstrap-auth-secret

  - name: unifi-ap-temp
    address: 10.1.102.12
    vendor: ubiquiti
    modules:
      - system
      - if_mib
      - ubiquiti_unifi
    interval: 60s
    availability: always-on
    address_stability: static-dhcp
    auth_profile: pending
    enabled: false
    blockers:
      - confirm-target-scope
      - confirm-auth-profile
      - bootstrap-auth-secret

  - name: apc-ups
    address: 10.1.10.43
    vendor: apc
    modules:
      - system
      - ups_mib
      - apcups
    interval: 30s
    availability: always-on
    # OpenTofu owns the imported RouterOS static reservation for this address.
    address_stability: static-dhcp
    auth_profile: pending
    enabled: false
    blockers:
      - confirm-auth-profile
      - bootstrap-auth-secret

  - name: brother-printer
    address: 10.1.10.13
    vendor: brother
    modules:
      - system
      - printer_mib
    interval: 60s
    availability: intermittent
    # OpenTofu owns the imported RouterOS static reservation for this address.
    address_stability: static-dhcp
    auth_profile: pending
    enabled: false
    blockers:
      - confirm-auth-profile
      - bootstrap-auth-secret
