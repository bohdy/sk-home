# Generate the non-secret exporter configuration with a content hash so every
# reviewed module change triggers a controlled Deployment rollout.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - network-policy.yaml
  - vm-service-scrape.yaml
  - vm-static-scrape.yaml
  - vm-static-scrape-unifi.yaml
configMapGenerator:
  - name: snmp-exporter-config
    namespace: observability
    files:
      - snmp.yml
generatorOptions:
  labels:
    app.kubernetes.io/name: snmp-exporter
    app.kubernetes.io/component: network-monitoring
