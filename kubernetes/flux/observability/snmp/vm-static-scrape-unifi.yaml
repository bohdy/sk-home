# Each controller-confirmed AP retains a stable inventory instance label.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: snmp-unifi-access-points
  namespace: observability
spec:
  jobName: snmp-unifi-access-points
  targetEndpoints:
    - targets: [10.1.102.10]
      labels: {instance: unifi-ap-1pp, vendor: ubiquiti, availability: always-on}
      path: /snmp
      params: {auth: [snmp_v2], module: [system, if_mib, ubiquiti_unifi]}
      interval: 60s
      scrapeTimeout: 30s
      relabelConfigs: [{sourceLabels: [__address__], targetLabel: __param_target}, {targetLabel: __address__, replacement: snmp-exporter.observability.svc.cluster.local.:9116}]
    - targets: [10.1.102.11]
      labels: {instance: unifi-ap-1np, vendor: ubiquiti, availability: always-on}
      path: /snmp
      params: {auth: [snmp_v2], module: [system, if_mib, ubiquiti_unifi]}
      interval: 60s
      scrapeTimeout: 30s
      relabelConfigs: [{sourceLabels: [__address__], targetLabel: __param_target}, {targetLabel: __address__, replacement: snmp-exporter.observability.svc.cluster.local.:9116}]
    - targets: [10.1.102.12]
      labels: {instance: unifi-ap-temp, vendor: ubiquiti, availability: always-on}
      path: /snmp
      params: {auth: [snmp_v2], module: [system, if_mib, ubiquiti_unifi]}
      interval: 60s
      scrapeTimeout: 30s
      relabelConfigs: [{sourceLabels: [__address__], targetLabel: __param_target}, {targetLabel: __address__, replacement: snmp-exporter.observability.svc.cluster.local.:9116}]
