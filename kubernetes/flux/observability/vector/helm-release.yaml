# Vector collects node-local Kubernetes container logs and forwards normalized
# JSON streams to the internal VictoriaLogs service.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: observability
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: vector
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  values:
    role: Agent

    commonLabels:
      cluster: sk-talos
      site: sk

    # The kubernetes_logs source honors this annotation before reading files,
    # preventing Vector from ingesting its own operational logs.
    podAnnotations:
      vector.dev/exclude: "true"

    podLabels:
      vector.dev/exclude: "true"
      cluster: sk-talos
      site: sk

    # Talos kernel records do not include the service-log extraTags. Each node
    # targets its own hostPort, so the Downward API provides the stable identity
    # for records received by that node's Vector Agent.
    extraEnv:
      - name: VECTOR_SELF_NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    nodeSelector:
      kubernetes.io/os: linux

    # Collection must cover control-plane container logs as well as the worker;
    # this tolerates the existing Talos control-plane scheduling taint only.
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    # Each node gets an independent bounded retry buffer. Host persistence is
    # intentional because a DaemonSet cannot use one shared RWO claim.
    persistence:
      hostPath:
        enabled: true
        path: /var/lib/vector

    containerPorts:
      - name: prom-exporter
        containerPort: 9598
        protocol: TCP
      - name: syslog-tcp
        containerPort: 514
        protocol: TCP
      - name: syslog-udp
        containerPort: 514
        protocol: UDP
      - name: talos-logs
        containerPort: 6051
        # Talos connects to its own management address, bypassing Kubernetes
        # Service load balancing so untagged kernel logs remain node-local.
        hostPort: 6051
        protocol: TCP

    service:
      enabled: false

    serviceHeadless:
      enabled: false

    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: true
        address: 0.0.0.0:8686
      sources:
        kubernetes_logs:
          type: kubernetes_logs
          # Current Vector source-side exclusion uses labels. Keep it for
          # collector self-exclusion; the transform below also supports the
          # design's annotation contract for arbitrary workloads.
          extra_label_selector: vector.dev/exclude!=true
        internal_metrics:
          type: internal_metrics
          scrape_interval_secs: 15
        # Raw socket sources preserve malformed input for the fallible parser
        # instead of dropping records that are not valid RFC syslog.
        syslog_tcp:
          type: socket
          address: 0.0.0.0:514
          mode: tcp
          decoding:
            codec: bytes
          framing:
            method: newline_delimited
          max_length: 262144
        syslog_udp:
          type: socket
          address: 0.0.0.0:514
          mode: udp
          decoding:
            codec: bytes
          max_length: 65507
        # Talos emits newline-delimited JSON over TCP. Keep bytes intact until
        # the remap transform so malformed input remains observable.
        talos_logs:
          type: socket
          address: 0.0.0.0:6051
          mode: tcp
          decoding:
            codec: bytes
          framing:
            method: newline_delimited
          max_length: 262144
      transforms:
        exclude_annotated:
          type: filter
          inputs:
            - kubernetes_logs
          condition: .kubernetes.pod_annotations."vector.dev/exclude" != "true"
        normalize_kubernetes:
          type: remap
          inputs:
            - exclude_annotated
          source: |
            .cluster = "sk-talos"
            .site = "sk"
            .source_type = "kubernetes"
            .received_at = now()
            .sender_timestamp = .timestamp
            .namespace = .kubernetes.pod_namespace
            .pod = .kubernetes.pod_name
            .container = .kubernetes.container_name
            .node = .kubernetes.pod_node_name
            .workload = .kubernetes.pod_owner
        # Bound each sender independently at ten times the initial planning
        # rate. Do not emit sender keys on discard metrics because arbitrary
        # source addresses would create attacker-controlled cardinality.
        throttle_syslog_tcp:
          type: throttle
          inputs:
            - syslog_tcp
          # The chart evaluates customConfig through Helm tpl, so emit the
          # braces as a quoted string for Vector's own template parser.
          key_field: '{{ "{{ host }}" }}'
          threshold: 1000
          window_secs: 1
          internal_metrics:
            emit_events_discarded_per_key: false
        throttle_syslog_udp:
          type: throttle
          inputs:
            - syslog_udp
          key_field: '{{ "{{ host }}" }}'
          threshold: 1000
          window_secs: 1
          internal_metrics:
            emit_events_discarded_per_key: false
        parse_syslog_tcp:
          type: remap
          inputs:
            - throttle_syslog_tcp
          source: |
            .transport = "tcp"
            .raw_message = to_string(.message) ?? encode_json(.message)
            parsed, parse_error = parse_syslog(.raw_message)
            if parse_error == null {
              . = merge(., parsed)
              .parse_status = "parsed"
            } else {
              .parse_status = "unparsed"
              .parse_error = to_string(parse_error)
            }
        parse_syslog_udp:
          type: remap
          inputs:
            - throttle_syslog_udp
          source: |
            .transport = "udp"
            .raw_message = to_string(.message) ?? encode_json(.message)
            parsed, parse_error = parse_syslog(.raw_message)
            if parse_error == null {
              . = merge(., parsed)
              .parse_status = "parsed"
            } else {
              .parse_status = "unparsed"
              .parse_error = to_string(parse_error)
            }
        normalize_syslog:
          type: remap
          inputs:
            - parse_syslog_tcp
            - parse_syslog_udp
          source: |
            .cluster = "sk-talos"
            .site = "sk"
            .source_type = "syslog"
            .received_at = now()
            .sender = if exists(.host) { to_string!(.host) } else { "unknown" }
            .sender_timestamp = .timestamp
            .timestamp = .received_at
            .device = if exists(.hostname) { to_string!(.hostname) } else { .sender }
        parse_talos:
          type: remap
          inputs:
            - talos_logs
          source: |
            received_at = .timestamp
            sender = if exists(.host) { to_string!(.host) } else { "unknown" }
            collector_node = get_env_var("VECTOR_SELF_NODE_NAME") ?? sender
            raw_message = to_string(.message) ?? encode_json(.message)
            parsed, parse_error = parse_json(raw_message)

            if parse_error == null && is_object(parsed) {
              . = merge(., object!(parsed))
              .parse_status = "parsed"
            } else {
              .parse_status = "unparsed"
              .parse_error = if parse_error == null {
                "Talos record is not a JSON object"
              } else {
                to_string(parse_error)
              }
            }

            .cluster = "sk-talos"
            .site = "sk"
            .source_type = "talos"
            .transport = "tcp"
            .raw_message = raw_message
            .received_at = received_at
            .sender = sender
            .device = if exists(.node) { to_string!(.node) } else { collector_node }
            .talos_stream = if .parse_status == "unparsed" {
              "unknown"
            } else if exists(."talos-service") {
              "service"
            } else {
              "kernel"
            }
            if exists(."talos-service") {
              .service = to_string!(."talos-service")
            } else {
              del(.service)
            }
            if exists(."talos-level") {
              .severity = to_string!(."talos-level")
            } else {
              del(.severity)
            }
            .message = if exists(.msg) { to_string!(.msg) } else { raw_message }

            sender_timestamp, timestamp_error = parse_timestamp(to_string(."talos-time") ?? "", format: "%+")
            if timestamp_error == null {
              .sender_timestamp = sender_timestamp
            }
            .timestamp = received_at
      # Unit tests exercise the normalization contract without opening sockets
      # or depending on the live VictoriaLogs backend.
      tests:
        - name: normalize Talos service log
          inputs:
            - insert_at: parse_talos
              type: log
              log_fields:
                host: 10.1.20.41
                message: '{"msg":"service marker","node":"sk-talos-cp-1","talos-level":"info","talos-service":"machined","talos-time":"2026-07-17T20:00:00Z"}'
                timestamp: "2026-07-17T20:00:01Z"
          outputs:
            - extract_from: parse_talos
              conditions:
                - type: vrl
                  source: |
                    assert_eq!(.parse_status, "parsed")
                    assert_eq!(.talos_stream, "service")
                    assert_eq!(.source_type, "talos")
                    assert_eq!(.sender, "10.1.20.41")
                    assert_eq!(.device, "sk-talos-cp-1")
                    assert_eq!(.service, "machined")
                    assert_eq!(.severity, "info")
                    assert_eq!(.message, "service marker")
                    assert!(is_timestamp(.sender_timestamp))
        - name: normalize Talos kernel log
          inputs:
            - insert_at: parse_talos
              type: log
              log_fields:
                host: 10.1.20.42
                message: '{"msg":"kernel marker","talos-level":"warning","talos-time":"2026-07-17T20:00:00Z"}'
                timestamp: "2026-07-17T20:00:01Z"
          outputs:
            - extract_from: parse_talos
              conditions:
                - type: vrl
                  source: |
                    assert_eq!(.parse_status, "parsed")
                    assert_eq!(.talos_stream, "kernel")
                    assert_eq!(.sender, "10.1.20.42")
                    assert_eq!(.device, "vector-test-node")
                    assert_eq!(.message, "kernel marker")
        - name: retain malformed Talos log
          inputs:
            - insert_at: parse_talos
              type: log
              log_fields:
                host: 10.1.20.43
                message: "not-json"
                timestamp: "2026-07-17T20:00:01Z"
          outputs:
            - extract_from: parse_talos
              conditions:
                - type: vrl
                  source: |
                    assert_eq!(.parse_status, "unparsed")
                    assert_eq!(.talos_stream, "unknown")
                    assert_eq!(.raw_message, "not-json")
                    assert_eq!(.message, "not-json")
                    assert!(exists(.parse_error))
      sinks:
        victoria_logs:
          type: http
          inputs:
            - normalize_kubernetes
            - normalize_syslog
            - parse_talos
          uri: http://victoria-logs.observability.svc.cluster.local.:9428/insert/jsonline?_stream_fields=cluster,site,source_type,namespace,workload,pod,container,node,device,facility,severity,transport,talos_stream,service&_time_field=timestamp&_msg_field=message
          method: post
          compression: gzip
          encoding:
            codec: json
          framing:
            method: newline_delimited
          batch:
            max_bytes: 1048576
            timeout_secs: 2
          buffer:
            type: disk
            max_size: 1073741824
            when_full: block
          request:
            retry_initial_backoff_secs: 1
            timeout_secs: 30
          healthcheck:
            enabled: true
        prometheus_metrics:
          type: prometheus_exporter
          inputs:
            - internal_metrics
          address: 0.0.0.0:9598

    # Vector needs read access to Kubernetes log files but no added Linux
    # capabilities or writable root filesystem.
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      # The official image declares UID 0, and the Agent must write its
      # node-local hostPath checkpoint and disk-buffer directory.
      runAsUser: 0
      seccompProfile:
        type: RuntimeDefault
