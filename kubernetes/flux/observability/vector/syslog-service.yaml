# Cilium advertises one fixed logging VIP over BGP. Local traffic policy is a
# hard requirement because syslog and Talos records must retain the sender IP.
apiVersion: v1
kind: Service
metadata:
  name: syslog
  namespace: observability
  annotations:
    lbipam.cilium.io/ips: "10.1.30.54"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  loadBalancerSourceRanges:
    - 10.0.0.0/8
  selector:
    app.kubernetes.io/instance: vector
    app.kubernetes.io/name: vector
  ports:
    - name: syslog-tcp
      port: 514
      targetPort: syslog-tcp
      protocol: TCP
    - name: syslog-udp
      port: 514
      targetPort: syslog-udp
      protocol: UDP
    # Talos service and kernel logs use JSON lines on a dedicated TCP stream so
    # they cannot be mistaken for RFC syslog by the adjacent listeners.
    - name: talos-logs
      port: 6051
      targetPort: talos-logs
      protocol: TCP
