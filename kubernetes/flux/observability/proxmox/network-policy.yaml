# Place the exporter in ingress and egress default-deny, admitting only VMAgent
# scrapes, kubelet probes, and the single Proxmox API endpoint.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: proxmox-exporter
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "9221"
              protocol: TCP
    # Kubelet probes may originate from the local or another cluster node.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "9221"
              protocol: TCP
  egress:
    - toCIDR:
        - 10.1.100.201/32
      toPorts:
        - ports:
            - port: "8006"
              protocol: TCP
