# This release owns the metrics database, collection, evaluation, alert state,
# Kubernetes exporters, Grafana, and the VictoriaMetrics operator CRDs.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics
  namespace: observability
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  values:
    global:
      clusterLabel: cluster
      extraLabels:
        cluster: sk-talos
        site: sk

    defaultDashboards:
      enabled: true

    defaultRules:
      create: true
      # count:up0 intentionally emits no samples while every scrape target is
      # healthy, so the generic no-data detector produces a permanent false
      # positive for that valid state.
      rules:
        RecordingRulesNoData:
          enabled: false
      # Talos keeps scheduler and controller-manager metrics private. Disable
      # rules that otherwise report those intentionally absent jobs forever.
      groups:
        kube-scheduler.rules:
          enabled: false
        kubernetes-system-controller-manager:
          enabled: false
        kubernetes-system-scheduler:
          enabled: false

    defaultDatasources:
      # VictoriaLogs is a separate release, so provision its stable internal
      # service URL explicitly instead of enabling the bundled log backend.
      extra:
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          access: proxy
          uid: VictoriaLogs
          url: http://victoria-logs.observability.svc.cluster.local.:9428
          editable: false
          isDefault: false
          jsonData:
            maxLines: 200
    victoria-metrics-operator:
      enabled: true
      crds:
        plain: true
      operator:
        disable_prometheus_converter: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    vmsingle:
      enabled: true
      spec:
        replicaCount: 1
        retentionPeriod: 1y
        storage:
          storageClassName: synology-iscsi-retain
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 100Gi
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 3Gi

    vmagent:
      enabled: true
      spec:
        replicaCount: 1
        scrapeInterval: 30s
        externalLabels:
          cluster: sk-talos
          site: sk
        extraArgs:
          promscrape.streamParse: "true"
          promscrape.maxScrapeSize: 64MiB
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi

    vmalert:
      enabled: true
      spec:
        replicaCount: 1
        evaluationInterval: 30s
        externalLabels:
          cluster: sk-talos
          site: sk
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

    alertmanager:
      enabled: true
      spec:
        replicaCount: 1
        # Alertmanager reads notification credentials from mounted files; its
        # configuration intentionally does not contain inline secret values.
        secrets:
          - alertmanager-notifications
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: synology-iscsi-retain
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      config:
        route:
          receiver: blackhole
          group_by:
            - alertname
            - cluster
            - site
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 12h
          routes:
            # Critical alerts are immediately actionable. Warning and info
            # alerts continue to terminate at the blackhole root receiver
            # until the dedicated Discord webhook is available.
            - receiver: telegram-critical
              matchers:
                - severity="critical"
              continue: false
        # Prefer the most severe state when warning and critical thresholds for
        # the same condition overlap.
        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity=~"warning|info"
            equal:
              - alertname
              - cluster
              - site
          # A failed device probe makes future interface symptoms derivative.
          - source_matchers:
              - alertname="BlackboxProbeFailed"
            target_matchers:
              - alertname=~"SNMPInterfaceDown|SNMPInterfaceErrors"
            equal:
              - cluster
              - site
              - instance
          # Read-only log storage explains downstream Vector buffer pressure.
          - source_matchers:
              - alertname="VictoriaLogsStorageReadOnly"
            target_matchers:
              - alertname=~"VectorBufferFilling|VectorBufferNearlyFull"
            equal:
              - cluster
              - site
        receivers:
          - name: blackhole
          - name: telegram-critical
            telegram_configs:
              # Alertmanager 0.32 reads both values directly from Secret files;
              # neither value enters Helm output or generated config Secrets.
              - bot_token_file: /etc/vm/secrets/alertmanager-notifications/telegram-bot-token
                chat_id_file: /etc/vm/secrets/alertmanager-notifications/telegram-chat-id
                send_resolved: true
                parse_mode: HTML

    grafana:
      enabled: true
      # Pin the signed backend plugin; do not depend on a floating marketplace
      # version at pod startup.
      plugins:
        - victoriametrics-logs-datasource@0.29.0
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      # cert-manager owns this Secret in a dependency-ordered Flux component.
      # Grafana reads the files directly and terminates HTTPS itself.
      extraSecretMounts:
        - name: grafana-tls
          secretName: grafana-tls
          mountPath: /etc/grafana/tls
          readOnly: true
      service:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "10.1.30.55"
        loadBalancerSourceRanges:
          - 10.0.0.0/8
        port: 443
        targetPort: 3000
        portName: https
        appProtocol: https
      # The parent stack owns this VMServiceScrape. Validate the public
      # certificate against its DNS name even though discovery connects through
      # the Kubernetes Service and pod address.
      vmScrape:
        spec:
          endpoints:
            - port: https
              scheme: https
              tlsConfig:
                serverName: grafana.bohdal.name
      readinessProbe:
        httpGet:
          path: /api/health
          port: grafana
          scheme: HTTPS
      livenessProbe:
        httpGet:
          path: /api/health
          port: grafana
          scheme: HTTPS
        initialDelaySeconds: 60
        timeoutSeconds: 30
        failureThreshold: 10
      persistence:
        enabled: true
        type: pvc
        storageClassName: synology-iscsi-retain
        accessModes:
          - ReadWriteOnce
        size: 10Gi
        # Grafana's PVC is a direct Helm resource, so retain it across failed
        # install remediation and intentional release removal.
        annotations:
          helm.sh/resource-policy: keep
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      grafana.ini:
        analytics:
          reporting_enabled: false
          check_for_updates: false
        server:
          protocol: https
          http_port: 3000
          domain: grafana.bohdal.name
          root_url: https://grafana.bohdal.name/
          enforce_domain: true
          cert_file: /etc/grafana/tls/tls.crt
          cert_key: /etc/grafana/tls/tls.key
        auth.anonymous:
          enabled: false
        security:
          disable_gravatar: true
          cookie_secure: true
        users:
          allow_sign_up: false
      ingress:
        enabled: false

    kube-state-metrics:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 384Mi

    prometheus-node-exporter:
      enabled: true
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 150m
          memory: 128Mi

    kubelet:
      enabled: true

    kubeApiServer:
      enabled: true

    coreDns:
      enabled: true

    # Talos does not expose these control-plane endpoints through ordinary pod
    # selectors, and the design forbids broadening listeners for dashboard gaps.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    vlsingle:
      enabled: false
    vlcluster:
      enabled: false
    vtsingle:
      enabled: false
    vtcluster:
      enabled: false
