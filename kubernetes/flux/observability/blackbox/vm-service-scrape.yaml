# Exporter process metrics are independent from probe results and reveal
# reload, process, and HTTP collection health.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: blackbox-exporter
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      sampleLimit: 1000
      seriesLimit: 1000
