# Only in-cluster VMAgent accesses the probe and self-metrics endpoints.
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/component: synthetic-monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: blackbox-exporter
  ports:
    - name: http
      port: 9115
      targetPort: http
      protocol: TCP
