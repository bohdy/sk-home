# Each endpoint preserves a stable logical instance while relabeling the actual
# scrape address to the shared multi-target exporter Service.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: blackbox-gateway-icmp
  namespace: observability
spec:
  jobName: blackbox-gateway-icmp
  targetEndpoints:
    - targets:
        - 10.1.100.1
      labels:
        instance: mikrotik-gw
        probe: icmp
        availability: always-on
      path: /probe
      params:
        module:
          - gateway_icmp
      interval: 30s
      scrapeTimeout: 10s
      sampleLimit: 500
      seriesLimit: 500
      relabelConfigs:
        - sourceLabels:
            - __address__
          targetLabel: __param_target
        - targetLabel: __address__
          replacement: blackbox-exporter.observability.svc.cluster.local.:9115
---
# Probe the real LAN VIP while supplying Grafana's canonical hostname for both
# the HTTP Host header and TLS SNI/certificate verification.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: blackbox-grafana-https
  namespace: observability
spec:
  jobName: blackbox-grafana-https
  targetEndpoints:
    - targets:
        - https://10.1.30.55/api/health
      labels:
        instance: grafana
        probe: https
        availability: always-on
      path: /probe
      params:
        module:
          - strict_https_200
        hostname:
          - grafana.bohdal.name
      interval: 30s
      scrapeTimeout: 15s
      sampleLimit: 500
      seriesLimit: 500
      relabelConfigs:
        - sourceLabels:
            - __address__
          targetLabel: __param_target
        - targetLabel: __address__
          replacement: blackbox-exporter.observability.svc.cluster.local.:9115
---
# Cloudflare's documented 1.1.1.1 anycast address supplies a stable external
# HTTPS path without granting the exporter DNS egress or a broad destination.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: blackbox-external-https
  namespace: observability
spec:
  jobName: blackbox-external-https
  targetEndpoints:
    - targets:
        - https://1.1.1.1/
      labels:
        instance: cloudflare-one
        probe: https
        availability: always-on
      path: /probe
      params:
        module:
          - strict_https_200
        hostname:
          - one.one.one.one
      interval: 30s
      scrapeTimeout: 15s
      sampleLimit: 500
      seriesLimit: 500
      relabelConfigs:
        - sourceLabels:
            - __address__
          targetLabel: __param_target
        - targetLabel: __address__
          replacement: blackbox-exporter.observability.svc.cluster.local.:9115
---
# Query the real client-facing Blocky VIP rather than its internal Service so
# the probe covers Cilium LoadBalancer routing and the recursive DNS path.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: blackbox-blocky-dns
  namespace: observability
spec:
  jobName: blackbox-blocky-dns
  targetEndpoints:
    - targets:
        - 10.1.30.53:53
      labels:
        instance: blocky
        probe: dns
        availability: always-on
      path: /probe
      params:
        module:
          - blocky_dns
      interval: 30s
      scrapeTimeout: 10s
      sampleLimit: 500
      seriesLimit: 500
      relabelConfigs:
        - sourceLabels:
            - __address__
          targetLabel: __param_target
        - targetLabel: __address__
          replacement: blackbox-exporter.observability.svc.cluster.local.:9115
