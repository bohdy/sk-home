# One stateless replica is sufficient because temporary probe downtime is
# acceptable and the exporter holds no durable state.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/component: synthetic-monitoring
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blackbox-exporter
        app.kubernetes.io/component: synthetic-monitoring
    spec:
      automountServiceAccountToken: false
      # Prefer the general-purpose worker while allowing rescheduling during
      # maintenance because this is not a dedicated monitoring node.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: blackbox-exporter
          image: quay.io/prometheus/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
          args:
            - --config.file=/etc/blackbox-exporter/config.yml
            - --web.listen-address=:9115
          ports:
            - name: http
              containerPort: 9115
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # Linux ICMP probing requires an allowed ping group, root, or
              # NET_RAW; grant only the capability needed by this module.
              add:
                - NET_RAW
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox-exporter
              readOnly: true
      securityContext:
        fsGroup: 65534
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
