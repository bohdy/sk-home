# Keep local commit-time checks aligned around fast infrastructure feedback.
repos:
  - repo: local
    hooks:
      - id: dns-check
        name: dns rendered manifests
        entry: mise run dns-check
        language: system
        pass_filenames: false
        files: ^(kubernetes/flux/infrastructure/dns/|scripts/render-dns.py|mise.toml)

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        args:
          - --args=-no-color
          - --args=-diff
          - --args=-recursive

      - id: terraform_validate

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: pretty-format-json
        args:
          - "--autofix"

      - id: check-json
      - id: check-yaml
        args:
          - "--allow-multiple-documents"
      - id: trailing-whitespace
      - id: end-of-file-fixer
