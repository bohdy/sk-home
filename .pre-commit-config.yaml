# Keep local commit-time checks aligned around fast infrastructure feedback.
repos:
  - repo: local
    hooks:
      - id: dns-check
        name: dns rendered manifests
        entry: mise run dns-check
        language: system
        pass_filenames: false
        files: ^(kubernetes/flux/infrastructure/dns/|scripts/render-dns.py|mise.toml)

  - repo: local
    hooks:
      - id: opentofu-fmt
        name: OpenTofu format
        entry: tofu fmt -recursive -check -diff
        language: system
        pass_filenames: false
        files: ^terraform/.*\.(tf|tfvars)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: pretty-format-json
        args:
          - "--autofix"

      - id: check-json
      - id: check-yaml
        args:
          - "--allow-multiple-documents"
      - id: trailing-whitespace
      - id: end-of-file-fixer
