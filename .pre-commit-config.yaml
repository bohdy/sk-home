# Keep local commit-time checks aligned around fast Terraform feedback.
repos:
  - repo: local
    hooks:
      # Keep Markdown prose and list items on one physical line so docs diff
      # cleanly and follow the repository writing standard.
      - id: markdown-normalize
        name: normalize markdown
        entry: python3 scripts/normalize_markdown.py --write
        language: system
        files: ^.*\.md$

      # Enforce canonical Terraform formatting before code reaches CI.
      - id: terraform-fmt
        name: terraform fmt
        entry: terraform fmt -recursive
        language: system
        files: ^terraform/.*\.tf$
        pass_filenames: false

      # Run Terraform linting only against the stack roots affected by the
      # current change set so the hook stays fast as the repo grows.
      - id: terraform-tflint
        name: tflint
        entry: ./scripts/run-tflint-stacks.sh
        language: system
        files: ^terraform/.*\.(tf|tfvars)$
